<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error | SERAVIEL LABS</title>
  <meta name="description" content="Internal server error. Please try again later or return to SERAVIEL LABS.">
  <meta name="robots" content="noindex, follow">
  <style>
    /* === SERAVIEL LABS Design System === */
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --danger: #ef4444;
      --danger-light: #fef2f2;
      --danger-border: #fecaca;
      --radius: 20px;
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--danger-light);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      line-height: 1.5;
    }

    /* === Card === */
    .card {
      background: var(--surface);
      border: 1px solid var(--danger-border);
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: 0 10px 30px rgba(239,68,68,0.1);
      max-width: 480px;
      width: 100%;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Illustration === */
    .illustration {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      opacity: 0.9;
    }
    .illustration svg {
      width: 100%;
      height: 100%;
      stroke: var(--danger);
    }

    /* === Typography === */
    h1 {
      font-size: 64px;
      font-weight: 700;
      color: var(--danger);
      letter-spacing: -2px;
      margin-bottom: 4px;
      line-height: 1;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 28px;
    }

    /* === Actions === */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      max-width: 280px;
    }

    .btn-primary {
      background: var(--danger);
      color: white;
      border: 2px solid var(--danger);
    }
    .btn-primary:hover {
      background: #dc2626;
      border-color: #dc2626;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239,68,68,0.2);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--bg);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    /* === Footer === */
    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* === Toast (compatible with main site) === */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 20000;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--danger);
      padding: 14px 18px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text);
      min-width: 280px;
      max-width: 400px;
      animation: toastIn 0.3s ease-out forwards;
      opacity: 0;
      transform: translateX(100%);
      margin-top: 10px;
    }
    .toast-icon { flex-shrink: 0; width: 20px; height: 20px; }
    .toast-content { flex: 1; text-align: left; }
    .toast-close {
      background: none; border: none; padding: 4px;
      cursor: pointer; opacity: 0.6; transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .toast-close:hover { opacity: 1; }
    .toast-close svg { width: 16px; height: 16px; }
    @keyframes toastIn { to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(100%); } }

    /* === Responsive === */
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 56px; }
      .btn { width: 100%; }
      #toast-container { left: 16px; right: 16px; bottom: 16px; }
      .toast { min-width: auto; max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- SVG Illustration: Server error / warning -->
    <svg class="illustration" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="48" stroke="currentColor" stroke-width="2.5" stroke-dasharray="8 4"/>
      <path d="M60 35V55" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <path d="M60 65V85" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <circle cx="60" cy="60" r="6" fill="currentColor"/>
      <path d="M35 85L45 75M85 85L75 75M35 35L45 45M85 35L75 45" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>

    <h1>500</h1>
    <h2>Server Error</h2>
    <p>
      Something went wrong on our side.<br>
      Try refreshing the page or come back later.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Go to main page
      </a>
      <a href="/list" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        Browse all tools
      </a>
    </div>

    <div class="footer">
      <a href="https://seraviel-labs.vercel.app">seraviel-labs.vercel.app</a>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script>
    // === Toast System (compatible with main site) ===
    function toast(message, type = 'success', duration = 4000) {
      const globalToast = typeof window.toast === 'function' ? window.toast : null;
      if (globalToast && globalToast !== toast) { globalToast(message, type, duration); return; }

      const container = document.getElementById('toast-container');
      if (!container) return;

      const icons = {
        success: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        error: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
        warning: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>'
      };

      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `${icons[type] || icons.success}<div class="toast-content">${message}</div><button class="toast-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;
      
      el.querySelector('.toast-close').onclick = () => removeToast(el);
      container.appendChild(el);

      const timer = setTimeout(() => removeToast(el), duration);
      el.onmouseenter = () => clearTimeout(timer);
    }

    function removeToast(el) {
      el.style.animation = 'toastOut 0.3s ease-out forwards';
      setTimeout(() => el.remove(), 300);
    }

    // Show warning toast on load
    toast('Server error occurred', 'warning', 6000);
  </script>
</body>
</html>
