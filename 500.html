<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #fef2f2;
      color: #991b1b;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      background: #ffffff;
      border: 1px solid #fecaca;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 10px 30px rgba(239,68,68,0.1);
      max-width: 520px;
    }
    h1 {
      font-size: 72px;
      margin: 0;
      font-weight: 600;
      color: #dc2626;
      letter-spacing: -1px;
    }
    h2 {
      margin: 10px 0 6px;
      font-weight: 500;
      color: #7f1d1d;
    }
    p {
      color: #b91c1c;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .illustration {
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
      opacity: 0.9;
    }
    a {
      display: inline-block;
      padding: 11px 18px;
      border-radius: 10px;
      background: #fecaca;
      color: #7f1d1d;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }
    a:hover {
      background: #fca5a5;
      transform: translateY(-1px);
    }
    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="illustration" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="50" stroke="#ef4444" stroke-width="3" fill="none"/>
      <path d="M60 35V65" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
      <circle cx="60" cy="85" r="5" fill="#ef4444"/>
    </svg>
    <h1>500</h1>
    <h2>Server Error</h2>
    <p>
      Something went wrong on our side.<br>
      Try refreshing the page or come back later.
    </p>
    <a href="https://seraviel-labs.vercel.app/">Go back to the main page</a>
    <div class="footer">seraviel-labs.vercel.app</div>
  </div>
</body>
</html>
