<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations | SERAVIEL LABS</title>
  <link rel="stylesheet" href="/toast.css">
  <script src="/toast.js"></script>
  <style>
    :root {
      --bg: #f8fafc; --surface: #fff; --text: #0f172a;
      --text-muted: #64748b; --accent: #0d9488; --border: #e2e8f0;
      --radius: 12px; --font: system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .logo { font-weight: 700; font-size: 16px; text-decoration: none; color: var(--text); display: flex; align-items: center; gap: 10px; }
    .logo svg { width: 20px; height: 20px; stroke: var(--accent); }
    nav a { margin-left: 16px; text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500; }
    nav a:hover, nav a.active { color: var(--accent); }
    main { flex: 1; padding: 40px 24px; max-width: 900px; margin: 0 auto; width: 100%; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--text-muted); margin-bottom: 24px; }
    
    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border: 1px solid var(--border); background: var(--surface);
      border-radius: 20px; font-size: 13px; color: var(--text-muted); cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #f0fdfa; }
    
    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; text-decoration: none; color: inherit; transition: transform 0.2s, border-color 0.2s;
      position: relative;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .card.pinned { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(13,148,136,0.1); }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .card-title { font-weight: 600; font-size: 16px; }
    .card-actions { display: flex; gap: 4px; }
    .card-actions button {
      background: none; border: none; padding: 4px; cursor: pointer; opacity: 0.6;
      transition: opacity 0.2s; display: flex; align-items: center;
    }
    .card-actions button:hover { opacity: 1; }
    .card-actions svg { width: 16px; height: 16px; stroke: var(--text-muted); }
    
    .card-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px; }
    .card-meta { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--text-muted); }
    .category-badge {
      padding: 2px 8px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; text-transform: capitalize;
    }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .tag { font-size: 11px; padding: 2px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; color: var(--text-muted); }
    
    .empty { text-align: center; padding: 40px; color: var(--text-muted); background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); }
    footer { text-align: center; padding: 24px; font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--border); }
    
    @media (max-width: 600px) {
      .filters { gap: 6px; }
      .filter-btn { padding: 6px 12px; font-size: 12px; }
    }
    .toast-container { bottom: 24px !important; top: auto !important; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      SERAVIEL LABS
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/list">Apps</a>
      <a href="/presentation" class="active">Presentations</a>
    </nav>
  </header>
  <main>
    <h1 data-i18n="presentations.title">Presentations</h1>
    <p class="subtitle" data-i18n="presentations.subtitle">Интерактивные демонстрации инструментов и концепций лаборатории.</p>
    
    <div class="filters" id="filters"></div>
    <div class="grid" id="pres-grid"></div>
  </main>
  <footer>© 2024–2026 SERAVIEL LABS</footer>

  <script>
    // === Simple i18n (free, no deps) ===
    const i18n = {
      ru: {
        "presentations.title": "Презентации",
        "presentations.subtitle": "Интерактивные демонстрации инструментов и концепций лаборатории.",
        "filter.all": "Все",
        "filter.school-project": "Учебные",
        "filter.community": "Сообщество",
        "filter.tutorial": "Обучение",
        "filter.demo": "Демо",
        "filter.general": "Общее",
        "action.share": "Поделиться",
        "action.pin": "Закрепить",
        "action.unpin": "Открепить",
        "toast.copied": "Ссылка скопирована",
        "toast.pinned": "Презентация закреплена",
        "toast.unpinned": "Презентация откреплена"
      },
      en: {
        "presentations.title": "Presentations",
        "presentations.subtitle": "Interactive demos of tools and concepts from the lab.",
        "filter.all": "All",
        "filter.school-project": "School",
        "filter.community": "Community",
        "filter.tutorial": "Tutorial",
        "filter.demo": "Demo",
        "filter.general": "General",
        "action.share": "Share",
        "action.pin": "Pin",
        "action.unpin": "Unpin",
        "toast.copied": "Link copied",
        "toast.pinned": "Presentation pinned",
        "toast.unpinned": "Presentation unpinned"
      }
    };
    
    function t(key) {
      const lang = new URLSearchParams(location.search).get('lang') || navigator.language.split('-')[0] || 'ru';
      return i18n[lang]?.[key] || i18n.ru[key] || key;
    }
    
    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t(key)) el.textContent = t(key);
      });
    }

    // === Pinned Presentations (localStorage) ===
    const PINNED_KEY = 'seraviel_pinned_presentations';
    function getPinned() {
      try { return JSON.parse(localStorage.getItem(PINNED_KEY)) || []; }
      catch { return []; }
    }
    function togglePin(id) {
      const pinned = getPinned();
      const idx = pinned.indexOf(id);
      if (idx === -1) pinned.push(id);
      else pinned.splice(idx, 1);
      localStorage.setItem(PINNED_KEY, JSON.stringify(pinned));
      return pinned.includes(id);
    }

    // === Share (Web Share API + fallback) ===
    async function sharePresentation(title, path) {
      const url = location.origin + path;
      if (navigator.share) {
        try {
          await navigator.share({ title, text: title, url });
          return true;
        } catch(e) { if (e.name !== 'AbortError') throw e; }
      }
      // Fallback: copy link
      await navigator.clipboard.writeText(url);
      if (window.toast) toast.success(t('toast.copied'));
      return true;
    }

    // === Render ===
    let allPresentations = [];
    let currentFilter = 'all';

    function renderFilters(categories) {
      const container = document.getElementById('filters');
      const filters = ['all', ...categories];
      container.innerHTML = filters.map(cat => `
        <button class="filter-btn ${cat === currentFilter ? 'active' : ''}" 
                data-filter="${cat}">${t('filter.' + cat) || cat}</button>
      `).join('');
      container.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.filter;
          container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderGrid();
        });
      });
    }

    function renderGrid() {
      const grid = document.getElementById('pres-grid');
      const pinned = getPinned();
      const filtered = currentFilter === 'all' 
        ? allPresentations 
        : allPresentations.filter(p => p.category === currentFilter);
      
      // Sort: pinned first
      filtered.sort((a, b) => {
        const aPinned = pinned.includes(a.id) ? 1 : 0;
        const bPinned = pinned.includes(b.id) ? 1 : 0;
        return bPinned - aPinned;
      });
      
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty">${t('empty')}</div>`;
        return;
      }
      
      grid.innerHTML = filtered.map(p => {
        const isPinned = pinned.includes(p.id);
        return `
          <a href="${p.path}" class="card ${isPinned ? 'pinned' : ''}">
            <div class="card-header">
              <div class="card-title">${p.title}</div>
              <div class="card-actions">
                <button onclick="event.preventDefault(); sharePresentation('${p.title.replace(/'/g, "\\'")}', '${p.path}')" title="${t('action.share')}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                </button>
                <button onclick="event.preventDefault(); togglePinCard('${p.id}', this)" title="${isPinned ? t('action.unpin') : t('action.pin')}">
                  <svg viewBox="0 0 24 24" fill="${isPinned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                </button>
              </div>
            </div>
            <div class="card-desc">${p.description}</div>
            <div class="card-meta">
              <span class="category-badge">${p.category}</span>
              ${p.tags?.length ? `<span>• ${p.tags.slice(0,2).join(', ')}</span>` : ''}
            </div>
            ${p.tags?.length > 2 ? `<div class="tags">${p.tags.slice(2).map(tag => `<span class="tag">${tag}</span>`).join('')}</div>` : ''}
          </a>
        `;
      }).join('');
    }

    window.togglePinCard = function(id, btn) {
      const isPinned = togglePin(id);
      btn.querySelector('svg').setAttribute('fill', isPinned ? 'currentColor' : 'none');
      btn.setAttribute('title', isPinned ? t('action.unpin') : t('action.pin'));
      btn.closest('.card').classList.toggle('pinned', isPinned);
      if (window.toast) toast.success(isPinned ? t('toast.pinned') : t('toast.unpinned'));
    };

    // === Init ===
    fetch('/presentation/presentation-manifest.json')
      .then(r => r.json())
      .then(data => {
        if (!data.presentations || data.presentations.length === 0) {
          document.getElementById('pres-grid').innerHTML = `<div class="empty">${t('empty')}</div>`;
          return;
        }
        allPresentations = data.presentations;
        const categories = [...new Set(allPresentations.map(p => p.category))];
        renderFilters(categories);
        renderGrid();
        applyI18n();
      })
      .catch(() => {
        document.getElementById('pres-grid').innerHTML = `<div class="empty">${t('error')}</div>`;
      });

    if (window.toast) toast.config({ position: 'bottom-center', duration: 2000 });
  </script>
</body>
</html>
