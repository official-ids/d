<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps Catalog | SERAVIEL LABS</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    #search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 14px;
      color: var(--text);
    }
    #search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
    
    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
    }
    .chip:hover, .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .app-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    
    .app-header { display: flex; align-items: center; gap: 12px; }
    .app-icon {
      width: 48px; height: 48px;
      background: var(--accent-soft);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .app-name { font-weight: 700; font-size: 16px; }
    .app-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; flex: 1; }
    
    .app-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .tag {
      font-size: 11px;
      background: var(--bg);
      color: var(--text-muted);
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    
    .app-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      font-weight: 600;
      font-size: 14px;
      margin-top: 8px;
      text-decoration: none;
    }
    .app-link:hover { text-decoration: underline; }
    .app-link svg { width: 16px; height: 16px; }
    
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
    
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @media (max-width: 600px) {
      .apps-grid { grid-template-columns: 1fr; }
      .search-bar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">SERAVIEL<span>Labs</span></div>
      <a href="/" style="color:var(--accent);font-weight:600;text-decoration:none;">← Back to Hub</a>
    </header>
    
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search apps...">
      <div class="filter-chips" id="filter-chips">
        <span class="chip active" data-filter="all">All</span>
        <span class="chip" data-filter="design">Design</span>
        <span class="chip" data-filter="tools">Tools</span>
        <span class="chip" data-filter="dev">Dev</span>
        <span class="chip" data-filter="productivity">Productivity</span>
      </div>
    </div>
    
    <div id="apps-container">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading apps catalog...</div>
      </div>
    </div>
  </div>

  <script>
    const MANIFEST_URL = '/apps/manifest.json';
    let allApps = [];
    
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch(MANIFEST_URL);
        if (!res.ok) throw new Error('Manifest not found');
        const data = await res.json();
        allApps = data.apps || [];
        renderApps(allApps);
        setupFilters();
        setupSearch();
      } catch (err) {
        console.error('Failed to load manifest:', err);
        document.getElementById('apps-container').innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
            </svg>
            <div>Could not load apps catalog.<br>Check if <code>apps/manifest.json</code> exists.</div>
          </div>
        `;
      }
    });
    
    function renderApps(apps) {
      const container = document.getElementById('apps-container');
      if (apps.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            <div>No apps found matching your criteria.</div>
          </div>
        `;
        return;
      }
      
      container.innerHTML = `<div class="apps-grid">${apps.map(app => `
        <a href="${app.path}" class="app-card">
          <div class="app-header">
            <div class="app-icon">${app.icon || '🧩'}</div>
            <div class="app-name">${app.name}</div>
          </div>
          <div class="app-desc">${app.description}</div>
          ${app.tags?.length ? `<div class="app-tags">${app.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
          <div class="app-link">
            Open App
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </div>
        </a>
      `).join('')}</div>`;
    }
    
    function setupFilters() {
      const chips = document.querySelectorAll('.chip');
      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          chips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          const filter = chip.dataset.filter;
          const filtered = filter === 'all' 
            ? allApps 
            : allApps.filter(app => app.tags?.includes(filter));
          renderApps(filtered);
        });
      });
    }
    
    function setupSearch() {
      const input = document.getElementById('search-input');
      input.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (!query) {
          renderApps(allApps);
          return;
        }
        const filtered = allApps.filter(app => 
          app.name.toLowerCase().includes(query) ||
          app.description.toLowerCase().includes(query) ||
          app.tags?.some(t => t.toLowerCase().includes(query))
        );
        renderApps(filtered);
      });
    }
  </script>
</body>
</html>
