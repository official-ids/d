<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>glitchquiz — Roblox Assessment</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roblox, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      margin: 24px auto;
    }

    .header {
      background: #00a2ff;
      color: #fff;
      padding: 20px 24px;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header::before {
      content: "✴";
      font-size: 1.2rem;
    }

    .content {
      padding: 0;
    }

    .form-wrapper {
      width: 100%;
      height: 640px;
      min-height: 480px;
    }

    .form-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .footer {
      padding: 16px 24px;
      background: #fafafa;
      border-top: 1px solid #eee;
      font-size: 0.9rem;
      color: #666;
      text-align: center;
    }

    .footer a {
      color: #00a2ff;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* Адаптив для мобильных */
    @media (max-width: 640px) {
      .form-wrapper {
        height: 75vh;
        min-height: 400px;
      }
      .header {
        font-size: 1rem;
        padding: 16px 20px;
      }
      body {
        padding: 8px;
      }
    }

    /* Фолбэк, если iframe не загрузится */
    .fallback {
      display: none;
      padding: 40px 24px;
      text-align: center;
      color: #666;
    }
    .fallback.show {
      display: block;
    }
    .fallback-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      background: #00a2ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }
    .fallback-btn:hover {
      background: #0089d9;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">glitchquiz — Roblox Knowledge Assessment</div>
    
    <div class="content">
      <div class="form-wrapper">
        <iframe 
          src="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAN__4CobF9UQTQ3VzUzMEFVN1FQUjVGNk40OVBQNTNOVy4u&embed=true" 
          frameborder="0" 
          marginwidth="0" 
          marginheight="0" 
          style="border: none; max-width:100%; max-height:100vh" 
          allowfullscreen 
          webkitallowfullscreen 
          mozallowfullscreen 
          msallowfullscreen
          title="glitchquiz Form"
          onload="this.parentElement.nextElementSibling.classList.remove('show')"
          onerror="this.parentElement.nextElementSibling.classList.add('show')">
        </iframe>
      </div>
      
      <!-- Фолбэк-сообщение на случай, если форма не загрузится -->
      <div class="fallback">
        <p>The form didn't load. Try opening it in a new tab:</p>
        <a 
          class="fallback-btn" 
          href="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=DQSIkWdsW0yxEjajBLZtrQAAAAAAAAAAAAN__4CobF9UQTQ3VzUzMEFVN1FQUjVGNk40OVBQNTNOVy4u" 
          target="_blank" 
          rel="noopener noreferrer">
          Открыть glitchquiz ↗
        </a>
      </div>
    </div>
    
    <div class="footer">
      <small>
        Invitation from <strong>Roblox Moderation</strong> • 
        <a href="https://seraviel-labs.vercel.app/info" target="_blank" rel="noopener">Seraviel-labs</a> • 
        Deadline: May 12, 2026
      </small>
    </div>
  </div>

  <script>
    // Дополнительная проверка загрузки iframe
    document.addEventListener('DOMContentLoaded', function() {
      const iframe = document.querySelector('.form-wrapper iframe');
      const fallback = document.querySelector('.fallback');
      
      // Таймаут на случай, если onload не сработает
      setTimeout(() => {
        if (!iframe.getAttribute('data-loaded')) {
          fallback.classList.add('show');
        }
      }, 8000);
      
      // Отмечаем успешную загрузку
      iframe.addEventListener('load', function() {
        this.setAttribute('data-loaded', 'true');
      });
    });
  </script>

</body>
</html>
