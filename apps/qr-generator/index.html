<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Generator | SERAVIEL LABS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg: #0b1120;
      --surface: #111827;
      --border: #1f2937;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --font-sans: system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 20px;
    }
    .logo svg { stroke: var(--accent); width: 28px; height: 28px; }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title svg { width: 20px; height: 20px; stroke: var(--accent); }
    
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    input[type="text"], textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    textarea { min-height: 80px; resize: vertical; }
    input[type="text"]:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .color-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .color-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="color"] {
      width: 50px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      cursor: pointer;
    }
    
    .range-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .range-value {
      min-width: 50px;
      text-align: right;
      font-family: monospace;
      color: var(--accent);
    }
    
    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
    }
    .btn:hover { background: #4f46e5; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn.secondary:hover { background: var(--border); }
    
    .qr-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      background: var(--bg);
      border-radius: 12px;
      padding: 24px;
      border: 2px dashed var(--border);
    }
    #qrcode {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #qrcode canvas, #qrcode img {
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    
    .download-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
      width: 100%;
    }
    
    .history {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .history-item {
      aspect-ratio: 1;
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .history-item:hover { border-color: var(--accent); transform: scale(1.05); }
    .history-item img { width: 100%; height: 100%; object-fit: cover; }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }
    
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        QR Generator
      </div>
    </header>
    
    <div class="grid">
      <!-- Left Panel: Settings -->
      <div class="panel">
        <div class="panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Content
        </div>
        
        <div class="form-group">
          <label>Text or URL</label>
          <textarea id="qr-text" placeholder="https://seraviel-labs.vercel.app">https://seraviel-labs.vercel.app</textarea>
        </div>
        
        <div class="form-group">
          <label>Error Correction</label>
          <select id="error-level">
            <option value="L">Low (7%)</option>
            <option value="M" selected>Medium (15%)</option>
            <option value="Q">Quartile (25%)</option>
            <option value="H">High (30%)</option>
          </select>
        </div>
        
        <div class="panel-title" style="margin-top: 32px;">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0-7 18 14.5 14.5 0 0 0 14 0 14.5 14.5 0 0 0-7-18z"/></svg>
          Appearance
        </div>
        
        <div class="form-group">
          <label>Colors</label>
          <div class="color-inputs">
            <div class="color-group">
              <input type="color" id="color-dark" value="#000000">
              <span>Foreground</span>
            </div>
            <div class="color-group">
              <input type="color" id="color-light" value="#ffffff">
              <span>Background</span>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label>Size: <span id="size-value">256</span>px</label>
          <div class="range-group">
            <input type="range" id="qr-size" min="128" max="512" value="256" step="32">
            <span class="range-value" id="size-display">256</span>
          </div>
        </div>
        
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="transparent-bg">
            <label for="transparent-bg" style="margin: 0; cursor: pointer;">Transparent Background</label>
          </div>
        </div>
        
        <button class="btn" onclick="generateQR()" style="margin-top: 24px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Generate QR Code
        </button>
      </div>
      
      <!-- Right Panel: Preview -->
      <div class="panel">
        <div class="panel-title">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </div>
        
        <div class="qr-container">
          <div id="qrcode"></div>
        </div>
        
        <div class="download-buttons">
          <button class="btn" onclick="downloadPNG()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download PNG
          </button>
          <button class="btn secondary" onclick="downloadSVG()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download SVG
          </button>
        </div>
        
        <div class="history">
          <div class="panel-title" style="margin: 0;">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" style="width: 18px; height: 18px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            History
          </div>
          <div class="history-grid" id="history-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let qrCode = null;
    let history = JSON.parse(localStorage.getItem('seraviel_qr_history') || '[]');
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Event listeners
      document.getElementById('qr-text').addEventListener('input', debounce(generateQR, 500));
      document.getElementById('error-level').addEventListener('change', generateQR);
      document.getElementById('color-dark').addEventListener('input', generateQR);
      document.getElementById('color-light').addEventListener('input', generateQR);
      document.getElementById('qr-size').addEventListener('input', (e) => {
        document.getElementById('size-value').textContent = e.target.value;
        document.getElementById('size-display').textContent = e.target.value;
        generateQR();
      });
      document.getElementById('transparent-bg').addEventListener('change', generateQR);
      
      // Load history
      renderHistory();
      
      // Generate initial QR
      generateQR();
    });
    
    function generateQR() {
      const text = document.getElementById('qr-text').value || ' ';
      const size = parseInt(document.getElementById('qr-size').value);
      const colorDark = document.getElementById('transparent-bg').checked ? '#000000' : document.getElementById('color-dark').value;
      const colorLight = document.getElementById('transparent-bg').checked ? '#00000000' : document.getElementById('color-light').value;
      const correctLevel = document.getElementById('error-level').value;
      
      // Clear previous
      const container = document.getElementById('qrcode');
      container.innerHTML = '';
      
      // Generate new QR
      try {
        qrCode = new QRCode(container, {
          text: text,
          width: size,
          height: size,
          colorDark: colorDark,
          colorLight: colorLight,
          correctLevel: QRCode.CorrectLevel[correctLevel]
        });
        
        // Add to history after delay
        setTimeout(() => {
          addToHistory(text, container.querySelector('canvas') || container.querySelector('img'));
        }, 100);
        
      } catch (err) {
        console.error('QR Generation Error:', err);
        container.innerHTML = '<div style="color: #ef4444; text-align: center;">Error generating QR code</div>';
      }
    }
    
    function addToHistory(text, element) {
      if (!element) return;
      
      const canvas = document.createElement('canvas');
      canvas.width = 80;
      canvas.height = 80;
      const ctx = canvas.getContext('2d');
      
      if (element.tagName === 'CANVAS') {
        ctx.drawImage(element, 0, 0, 80, 80);
      } else {
        ctx.drawImage(element, 0, 0, 80, 80);
      }
      
      const dataUrl = canvas.toDataURL();
      history.unshift({ text, image: dataUrl, date: new Date().toISOString() });
      if (history.length > 12) history.pop();
      
      localStorage.setItem('seraviel_qr_history', JSON.stringify(history));
      renderHistory();
    }
    
    function renderHistory() {
      const grid = document.getElementById('history-grid');
      grid.innerHTML = '';
      
      if (history.length === 0) {
        grid.innerHTML = '<div style="color: var(--text-muted); grid-column: 1/-1; text-align: center; font-size: 13px;">No history yet</div>';
        return;
      }
      
      history.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.title = item.text.length > 30 ? item.text.substring(0, 30) + '...' : item.text;
        div.onclick = () => {
          document.getElementById('qr-text').value = item.text;
          generateQR();
        };
        
        const img = document.createElement('img');
        img.src = item.image;
        img.alt = 'QR ' + (index + 1);
        div.appendChild(img);
        grid.appendChild(div);
      });
    }
    
    function downloadPNG() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) {
        alert('Generate a QR code first!');
        return;
      }
      
      const link = document.createElement('a');
      link.download = 'qrcode-' + Date.now() + '.png';
      link.href = canvas.toDataURL();
      link.click();
    }
    
    function downloadSVG() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) {
        alert('Generate a QR code first!');
        return;
      }
      
      // Convert canvas to SVG
      const size = canvas.width;
      const modules = qrCode._oQRCode.modules;
      let svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
      svgContent += `<rect width="${size}" height="${size}" fill="${document.getElementById('color-light').value}"/>`;
      
      const moduleSize = size / modules.length;
      const colorDark = document.getElementById('color-dark').value;
      
      for (let row = 0; row < modules.length; row++) {
        for (let col = 0; col < modules.length; col++) {
          if (modules[row][col]) {
            svgContent += `<rect x="${col * moduleSize}" y="${row * moduleSize}" width="${moduleSize}" height="${moduleSize}" fill="${colorDark}"/>`;
          }
        }
      }
      
      svgContent += '</svg>';
      
      const blob = new Blob([svgContent], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = 'qrcode-' + Date.now() + '.svg';
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    }
    
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
  </script>
</body>
</html>
