<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steganography | SERAVIEL LABS</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --danger: #ef4444;
      --success: #10b981;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 1000px; margin: 0 auto; width: 100%; }
    
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 16px; border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .back-link {
      color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card-title {
      font-size: 18px; font-weight: 700; margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .card-title svg { width: 24px; height: 24px; color: var(--accent); }

    .label { font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; display: block; }
    
    textarea, input[type="text"] {
      width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: var(--font-sans); background: var(--bg); color: var(--text);
      resize: vertical;
    }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
    
    .file-drop {
      border: 2px dashed var(--border); border-radius: 8px; padding: 24px;
      text-align: center; cursor: pointer; transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .file-drop:hover, .file-drop.dragover { border-color: var(--accent); background: rgba(13,148,136,0.05); }
    .file-drop input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .file-info { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
    
    .btn {
      padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer; transition: background 0.2s; width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn svg { width: 18px; height: 18px; }

    .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--bg); }

    .result-box {
      margin-top: 16px; padding: 12px; background: var(--bg); border-radius: 8px;
      display: none; border: 1px solid var(--success);
    }
    .result-box.error { border-color: var(--danger); }
    .result-text { font-size: 14px; word-break: break-all; font-family: monospace; }
    
    .preview-img {
      max-width: 100%; max-height: 150px; object-fit: contain;
      border-radius: 6px; margin-top: 8px; display: none;
      border: 1px solid var(--border);
    }

    #hidden-canvas { display: none; }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to Hub
      </a>
      <div class="logo">Stego<span>Tool</span></div>
    </header>

    <div class="grid">
      <!-- ENCODE CARD -->
      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          Encode (Hide Message)
        </div>
        
        <div>
          <label class="label">1. Upload Image (PNG recommended)</label>
          <div class="file-drop" id="drop-zone-encode">
            <input type="file" id="encode-file" accept="image/*">
            <span>Click or Drop Image Here</span>
          </div>
          <div class="file-info" id="encode-info">No image selected</div>
          <img id="encode-preview" class="preview-img" alt="Preview">
        </div>

        <div>
          <label class="label">2. Secret Message</label>
          <textarea id="secret-text" rows="3" placeholder="Enter text to hide..."></textarea>
        </div>

        <button class="btn" id="btn-encode" onclick="encodeMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
          Encode & Download
        </button>

        <div class="result-box" id="encode-result"></div>
      </div>

      <!-- DECODE CARD -->
      <div class="card">
        <div class="card-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Decode (Reveal Message)
        </div>

        <div>
          <label class="label">1. Upload Image with Message</label>
          <div class="file-drop" id="drop-zone-decode">
            <input type="file" id="decode-file" accept="image/*">
            <span>Click or Drop Image Here</span>
          </div>
          <div class="file-info" id="decode-info">No image selected</div>
          <img id="decode-preview" class="preview-img" alt="Preview">
        </div>

        <button class="btn secondary" id="btn-decode" onclick="decodeMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
          Reveal Secret
        </button>

        <div class="result-box" id="decode-result"></div>
      </div>
    </div>
  </div>

  <canvas id="hidden-canvas"></canvas>

  <script>
    const canvas = document.getElementById('hidden-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let encodeImage = null;
    let decodeImgObj = null;

    document.getElementById('encode-file').addEventListener('change', function(e) {
      handleFileSelect(e.target.files[0], 'encode');
    });

    document.getElementById('decode-file').addEventListener('change', function(e) {
      handleFileSelect(e.target.files[0], 'decode');
    });

    function handleFileSelect(file, type) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          if (type === 'encode') {
            encodeImage = img;
            document.getElementById('encode-preview').src = img.src;
            document.getElementById('encode-preview').style.display = 'block';
            document.getElementById('encode-info').textContent = img.width + 'x' + img.height + ' px';
            document.getElementById('encode-info').style.color = 'var(--text)';
          } else {
            decodeImgObj = img;
            document.getElementById('decode-preview').src = img.src;
            document.getElementById('decode-preview').style.display = 'block';
            document.getElementById('decode-info').textContent = img.width + 'x' + img.height + ' px';
          }
        }
        img.src = e.target.result;
      }
      reader.readAsDataURL(file);
    }

    window.encodeMessage = function() {
      if (!encodeImage) return showError('encode-result', 'Please upload an image first.');
      const text = document.getElementById('secret-text').value;
      if (!text) return showError('encode-result', 'Please enter a secret message.');

      try {
        canvas.width = encodeImage.width;
        canvas.height = encodeImage.height;
        ctx.drawImage(encodeImage, 0, 0);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        // Convert text to UTF-8 bytes
        const encoder = new TextEncoder();
        const bytes = encoder.encode(text);
        
        // Create binary string: 32 bits for length + message bytes
        let binaryString = bytes.length.toString(2).padStart(32, '0');
        for (let i = 0; i < bytes.length; i++) {
          binaryString += bytes[i].toString(2).padStart(8, '0');
        }

        const capacity = Math.floor(data.length / 4 * 3);
        if (binaryString.length > capacity) {
          return showError('encode-result', 'Message too long! Image can hold ' + Math.floor(capacity / 8) + ' characters.');
        }

        let bitIndex = 0;
        for (let i = 0; i < data.length; i += 4) {
          if (bitIndex < binaryString.length) {
            data[i] = (data[i] & ~1) | parseInt(binaryString[bitIndex++]);
          }
          if (bitIndex < binaryString.length) {
            data[i + 1] = (data[i + 1] & ~1) | parseInt(binaryString[bitIndex++]);
          }
          if (bitIndex < binaryString.length) {
            data[i + 2] = (data[i + 2] & ~1) | parseInt(binaryString[bitIndex++]);
          }
          if (bitIndex >= binaryString.length) break;
        }

        ctx.putImageData(imageData, 0, 0);
        const link = document.createElement('a');
        link.download = 'secret_image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        showSuccess('encode-result', 'Image downloaded! It now contains your secret.');
      } catch (e) {
        showError('encode-result', 'Error: ' + e.message);
      }
    }

    window.decodeMessage = function() {
      if (!decodeImgObj) return showError('decode-result', 'Please upload an image first.');

      try {
        canvas.width = decodeImgObj.width;
        canvas.height = decodeImgObj.height;
        ctx.drawImage(decodeImgObj, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        // Read bits sequentially
        let allBits = '';
        for (let i = 0; i < data.length; i += 4) {
          allBits += (data[i] & 1);
          allBits += (data[i + 1] & 1);
          allBits += (data[i + 2] & 1);
        }

        // Read length (first 32 bits)
        const lengthBin = allBits.substring(0, 32);
        const msgLength = parseInt(lengthBin, 2);
        
        if (msgLength <= 0 || msgLength > 100000 || isNaN(msgLength)) {
          return showError('decode-result', 'No hidden message found (invalid header).');
        }

        // Read message bytes
        const msgBits = allBits.substring(32, 32 + (msgLength * 8));
        
        if (msgBits.length < msgLength * 8) {
          return showError('decode-result', 'Image too small or corrupted.');
        }

        // Convert bits to bytes
        const bytes = new Uint8Array(msgLength);
        for (let i = 0; i < msgLength; i++) {
          const byteBin = msgBits.substring(i * 8, (i + 1) * 8);
          bytes[i] = parseInt(byteBin, 2);
        }

        // Decode UTF-8 bytes to string
        const decoder = new TextDecoder('utf-8');
        const result = decoder.decode(bytes);

        const resBox = document.getElementById('decode-result');
        resBox.style.display = 'block';
        resBox.className = 'result-box';
        resBox.innerHTML = '<div style="font-weight:bold; margin-bottom:8px;">Decoded Message:</div><div class="result-text">' + escapeHtml(result) + '</div>';

      } catch (e) {
        console.error('Decode error:', e);
        showError('decode-result', 'Error decoding: ' + e.message);
      }
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.style.display = 'block';
      el.className = 'result-box error';
      el.textContent = msg;
    }

    function showSuccess(id, msg) {
      const el = document.getElementById(id);
      el.style.display = 'block';
      el.className = 'result-box';
      el.innerHTML = '<span style="color:var(--success);">Image downloaded! It now contains your secret.</span>';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
