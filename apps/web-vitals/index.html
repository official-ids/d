<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Performance Analyzer | SERAVIEL LABS</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --good: #10b981;
      --needs: #f59e0b;
      --poor: #ef4444;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    
    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .search-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    #url-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
    }
    #url-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
    
    .api-key-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    #api-key-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
    }
    .hint { font-size: 12px; color: var(--text-muted); }
    .hint a { color: var(--accent); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
    
    .btn {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--border); }
    .btn svg { width: 18px; height: 18px; }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      display: none;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .results { display: none; }
    
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .score-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: white;
    }
    .score-circle.good { background: var(--good); }
    .score-circle.needs { background: var(--needs); }
    .score-circle.poor { background: var(--poor); }
    .score-label { font-weight: 600; font-size: 14px; color: var(--text); }
    
    .metrics-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    .section-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    
    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .metric-row:last-child { border-bottom: none; }
    .metric-info { display: flex; align-items: center; gap: 12px; }
    .metric-icon { width: 24px; height: 24px; color: var(--text-muted); }
    .metric-name { font-weight: 600; font-size: 14px; }
    .metric-desc { font-size: 12px; color: var(--text-muted); }
    .metric-value { font-family: var(--font-mono); font-weight: 700; font-size: 15px; }
    .metric-value.good { color: var(--good); }
    .metric-value.needs { color: var(--needs); }
    .metric-value.poor { color: var(--poor); }
    
    .opportunities-list { list-style: none; }
    .opportunity-item {
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 4px solid var(--needs);
    }
    .opp-title { font-weight: 600; margin-bottom: 6px; font-size: 14px; }
    .opp-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .opp-savings { font-weight: 700; color: var(--accent); font-size: 13px; }
    
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid var(--poor);
      color: var(--poor);
      padding: 16px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
    }
    
    .cache-info {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: right;
    }
    
    @media (max-width: 700px) {
      .search-row { flex-direction: column; }
      .api-key-row { flex-direction: column; align-items: stretch; }
      .btn { width: 100%; justify-content: center; }
      .scores-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Site<span>Analyzer</span></div>
      <div style="font-size:13px;color:var(--text-muted)">PageSpeed Insights API</div>
    </header>
    
    <div class="search-box">
      <div class="search-row">
        <input type="text" id="url-input" placeholder="https://example.com" value="https://example.com">
        <button class="btn" onclick="analyze()" id="analyze-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Analyze
        </button>
      </div>
      
      <div class="api-key-row">
        <input type="password" id="api-key-input" placeholder="Google API Key (optional, for higher limits)">
        <button class="btn secondary" onclick="saveApiKey()" style="padding:8px 12px;font-size:13px;">Save Key</button>
      </div>
      
      <div class="hint">
        🔑 <a href="https://developers.google.com/speed/docs/insights/v5/get-started#key" target="_blank">Get free API key</a> for 25k requests/month. 
        Without key: limited to ~2 requests/minute.
      </div>
      <div class="hint" style="margin-top:4px;">
        💡 Results are cached locally to save API quota.
      </div>
    </div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Analyzing website... This may take 10-20 seconds</div>
    </div>
    
    <div class="error-box" id="error-box"></div>
    
    <div class="results" id="results">
      <div class="scores-grid" id="scores-grid"></div>
      <div class="metrics-section" id="metrics-section"></div>
      <div class="metrics-section" id="opportunities-section"></div>
      <div class="cache-info" id="cache-info"></div>
    </div>
  </div>

  <script>
    const CATEGORIES = {
      performance: { name: 'Performance', icon: 'speed' },
      accessibility: { name: 'Accessibility', icon: 'accessibility' },
      'best-practices': { name: 'Best Practices', icon: 'check' },
      seo: { name: 'SEO', icon: 'search' }
    };
    
    const METRICS = {
      'first-contentful-paint': { name: 'First Contentful Paint', desc: 'Time when first content is painted', unit: 's' },
      'largest-contentful-paint': { name: 'Largest Contentful Paint', desc: 'Time when largest content is painted', unit: 's' },
      'total-blocking-time': { name: 'Total Blocking Time', desc: 'Time when main thread was blocked', unit: 'ms' },
      'cumulative-layout-shift': { name: 'Cumulative Layout Shift', desc: 'Measure of visual stability', unit: '' },
      'speed-index': { name: 'Speed Index', desc: 'How quickly content is visible', unit: 's' },
      'time-to-interactive': { name: 'Time to Interactive', desc: 'Time until page is fully interactive', unit: 's' }
    };

    // Load saved API key
    const savedKey = localStorage.getItem('seraviel_psi_key');
    if (savedKey) document.getElementById('api-key-input').value = savedKey;

    function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (key) {
        localStorage.setItem('seraviel_psi_key', key);
        alert('API key saved!');
      }
    }

    function getCacheKey(url) {
      return `psi_cache_${btoa(url).replace(/[^a-z0-9]/gi, '')}`;
    }

    async function analyze() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) return alert('Please enter a URL');
      
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const errorBox = document.getElementById('error-box');
      const cacheInfo = document.getElementById('cache-info');
      
      loading.style.display = 'block';
      results.style.display = 'none';
      errorBox.style.display = 'none';
      cacheInfo.textContent = '';
      
      const cacheKey = getCacheKey(url);
      const cached = localStorage.getItem(cacheKey);
      
      // Check cache (valid for 24 hours)
      if (cached) {
        try {
          const { data, timestamp } = JSON.parse(cached);
          if (Date.now() - timestamp < 24 * 60 * 60 * 1000) {
            cacheInfo.textContent = `✓ Loaded from cache (${new Date(timestamp).toLocaleTimeString()})`;
            displayResults(data);
            loading.style.display = 'none';
            results.style.display = 'block';
            return;
          }
        } catch (e) { localStorage.removeItem(cacheKey); }
      }
      
      try {
        const apiKey = document.getElementById('api-key-input').value.trim();
        const encodedUrl = encodeURIComponent(url);
        let apiUrl = `https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${encodedUrl}&category=PERFORMANCE&category=ACCESSIBILITY&category=BEST_PRACTICES&category=SEO&strategy=mobile`;
        if (apiKey) apiUrl += `&key=${apiKey}`;
        
        const response = await fetch(apiUrl);
        
        if (response.status === 429) {
          throw new Error('Rate limit exceeded (429). Wait 1 minute or add your API key for higher limits.');
        }
        if (!response.ok) throw new Error(`API error: ${response.status}. Check URL and try again.`);
        
        const data = await response.json();
        
        // Save to cache
        localStorage.setItem(cacheKey, JSON.stringify({ data, timestamp: Date.now() }));
        
        displayResults(data);
        loading.style.display = 'none';
        results.style.display = 'block';
        cacheInfo.textContent = `✓ New data fetched and cached`;
        
      } catch (err) {
        loading.style.display = 'none';
        errorBox.innerHTML = `<strong>Error:</strong> ${err.message}<br><br>
          <button class="btn secondary" onclick="loadDemo()" style="margin-top:8px;padding:6px 12px;font-size:12px;">
            Load Demo Data
          </button>`;
        errorBox.style.display = 'block';
      }
    }
    
    // Demo data fallback
    function loadDemo() {
      const demoData = {
        lighthouseResult: {
          categories: {
            performance: { score: 0.85 },
            accessibility: { score: 0.92 },
            'best-practices': { score: 0.88 },
            seo: { score: 1.0 }
          },
          audits: {
            'first-contentful-paint': { numericValue: 1200, displayValue: '1.2 s', score: 1 },
            'largest-contentful-paint': { numericValue: 2100, displayValue: '2.1 s', score: 0.9 },
            'total-blocking-time': { numericValue: 150, displayValue: '150 ms', score: 0.8 },
            'cumulative-layout-shift': { numericValue: 0.05, displayValue: '0.05', score: 1 },
            'speed-index': { numericValue: 2500, displayValue: '2.5 s', score: 0.9 },
            'time-to-interactive': { numericValue: 3200, displayValue: '3.2 s', score: 0.8 },
            'unused-css-rules': { 
              title: 'Remove unused CSS', 
              description: 'Reduce unused rules from stylesheets and defer CSS not used for above-the-fold content.',
              details: { type: 'opportunity', overallSavingsMs: 800 },
              score: 0.5
            },
            'uses-optimized-images': {
              title: 'Efficiently encode images',
              description: 'Optimized images load faster and consume less cellular data.',
              details: { type: 'opportunity', overallSavingsMs: 1200 },
              score: 0.3
            }
          }
        }
      };
      displayResults(demoData);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('results').style.display = 'block';
      document.getElementById('cache-info').textContent = '🧪 Showing demo data';
      document.getElementById('error-box').style.display = 'none';
    }
    
    function displayResults(data) {
      const lhr = data.lighthouseResult;
      
      // Display scores
      const scoresGrid = document.getElementById('scores-grid');
      scoresGrid.innerHTML = '';
      
      Object.entries(lhr.categories).forEach(([key, category]) => {
        const score = Math.round(category.score * 100);
        const status = score >= 90 ? 'good' : score >= 50 ? 'needs' : 'poor';
        
        const card = document.createElement('div');
        card.className = 'score-card';
        card.innerHTML = `
          <div class="score-circle ${status}">${score}</div>
          <div class="score-label">${CATEGORIES[key]?.name || key}</div>
        `;
        scoresGrid.appendChild(card);
      });
      
      // Display metrics
      const metricsSection = document.getElementById('metrics-section');
      metricsSection.innerHTML = '<div class="section-title">Core Web Vitals & Metrics</div>';
      
      const metricsData = lhr.audits;
      Object.entries(METRICS).forEach(([key, metric]) => {
        if (!metricsData[key]) return;
        const audit = metricsData[key];
        const value = audit.numericValue;
        const displayValue = audit.displayValue || formatValue(value, metric.unit);
        const score = audit.score;
        const status = score >= 0.9 ? 'good' : score >= 0.5 ? 'needs' : 'poor';
        
        const row = document.createElement('div');
        row.className = 'metric-row';
        row.innerHTML = `
          <div class="metric-info">
            <svg class="metric-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </svg>
            <div>
              <div class="metric-name">${metric.name}</div>
              <div class="metric-desc">${metric.desc}</div>
            </div>
          </div>
          <div class="metric-value ${status}">${displayValue}</div>
        `;
        metricsSection.appendChild(row);
      });
      
      // Display opportunities
      const oppSection = document.getElementById('opportunities-section');
      oppSection.innerHTML = '<div class="section-title">Optimization Opportunities</div>';
      
      const opportunities = Object.values(lhr.audits).filter(a => a.details?.type === 'opportunity' && a.score < 1);
      
      if (opportunities.length === 0) {
        oppSection.innerHTML += '<div style="color:var(--good);font-weight:600;">✓ No major opportunities found. Great job!</div>';
      } else {
        const list = document.createElement('ul');
        list.className = 'opportunities-list';
        
        opportunities.slice(0, 5).forEach(opp => {
          const item = document.createElement('li');
          item.className = 'opportunity-item';
          const savings = opp.details?.overallSavingsMs ? `Saves ~${Math.round(opp.details.overallSavingsMs/100 * 10)/10}s` : '';
          item.innerHTML = `
            <div class="opp-title">${opp.title}</div>
            <div class="opp-desc">${opp.description}</div>
            ${savings ? `<div class="opp-savings">${savings}</div>` : ''}
          `;
          list.appendChild(item);
        });
        oppSection.appendChild(list);
      }
    }
    
    function formatValue(value, unit) {
      if (!unit) return value.toFixed(2);
      if (unit === 'ms') return Math.round(value) + ' ms';
      return (value / 1000).toFixed(2) + ' s';
    }
    
    document.getElementById('url-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
