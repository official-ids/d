<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>.gitignore Generator | SERAVIEL LABS</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 1100px; margin: 0 auto; width: 100%; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .back-link {
      color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; }

    .layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .label {
      display: block; font-size: 12px; font-weight: 700; color: var(--text-muted);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .search-box {
      position: relative; margin-bottom: 16px;
    }
    .search-box input {
      width: 100%; padding: 10px 12px 10px 36px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; background: var(--bg);
    }
    .search-box svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--text-muted);
    }

    .template-list {
      max-height: 500px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
    }
    .template-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
      transition: all 0.2s;
    }
    .template-item:hover { background: var(--bg); border-color: var(--accent); }
    .template-item.selected {
      background: rgba(13,148,136,0.1);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .template-item input { display: none; }
    .template-icon {
      width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    }
    .template-icon svg { width: 18px; height: 18px; }

    .btn {
      padding: 10px 16px; background: var(--accent); color: white;
      border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn svg { width: 16px; height: 16px; }
    .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn.secondary:hover { background: var(--bg); }
    .btn.danger { background: var(--danger); }
    .btn.danger:hover { background: #dc2626; }

    .btn-group { display: flex; gap: 8px; margin-top: 16px; }

    .preview-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px;
      font-family: var(--font-mono); font-size: 13px;
      white-space: pre-wrap; word-break: break-word;
      min-height: 400px; max-height: 70vh; overflow: auto;
      line-height: 1.6; color: var(--text);
    }

    .preview-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }

    .stats {
      font-size: 12px; color: var(--text-muted);
      margin-top: 8px;
    }

    .empty-state {
      text-align: center; padding: 40px; color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.5; }

    .category-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 8px 0 4px; margin-top: 12px;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: white; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>

    // === State ===
    let selectedTemplates = new Set();
    let searchQuery = '';

    // === DOM Elements ===
    const els = {
      templateList: document.getElementById('template-list'),
      searchInput: document.getElementById('search-input'),
      preview: document.getElementById('preview'),
      stats: document.getElementById('stats'),
      toast: document.getElementById('toast')
    };

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      renderTemplates();
      
      els.searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderTemplates();
      });
    });

    // === Render ===
    function renderTemplates() {
      const categories = {};
      
      // Group by category
      for (const [name, data] of Object.entries(TEMPLATES)) {
        if (searchQuery && !name.toLowerCase().includes(searchQuery)) continue;
        
        if (!categories[data.category]) {
          categories[data.category] = [];
        }
        categories[data.category].push(name);
      }

      // Render
      els.templateList.innerHTML = '';
      
      for (const [category, names] of Object.entries(categories)) {
        // Category label
        const catLabel = document.createElement('div');
        catLabel.className = 'category-label';
        catLabel.textContent = category;
        els.templateList.appendChild(catLabel);

        // Templates
        names.sort().forEach(name => {
          const item = document.createElement('div');
          item.className = `template-item ${selectedTemplates.has(name) ? 'selected' : ''}`;
          item.innerHTML = `
            <input type="checkbox" ${selectedTemplates.has(name) ? 'checked' : ''}>
            <div class="template-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
            </div>
            <span>${name}</span>
          `;
          item.onclick = () => toggleTemplate(name);
          els.templateList.appendChild(item);
        });
      }

      if (Object.keys(categories).length === 0) {
        els.templateList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted)">No templates found</div>';
      }

      generateGitignore();
    }

    // === Actions ===
    function toggleTemplate(name) {
      if (selectedTemplates.has(name)) {
        selectedTemplates.delete(name);
      } else {
        selectedTemplates.add(name);
      }
      renderTemplates();
    }

    function selectAll() {
      const visible = Array.from(els.templateList.querySelectorAll('.template-item'))
        .filter(item => item.style.display !== 'none');
      visible.forEach(item => {
        const name = item.querySelector('span').textContent;
        selectedTemplates.add(name);
      });
      renderTemplates();
    }

    function clearAll() {
      selectedTemplates.clear();
      renderTemplates();
    }

    function generateGitignore() {
      if (selectedTemplates.size === 0) {
        els.preview.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>Select templates to generate .gitignore</p>
          </div>
        `;
        els.stats.textContent = '';
        return;
      }

      let content = '# Auto-generated .gitignore\n';
      content += `# Generated on ${new Date().toLocaleDateString()}\n\n`;

      const sorted = Array.from(selectedTemplates).sort();
      sorted.forEach(name => {
        const template = TEMPLATES[name];
        content += `# ${name}\n`;
        content += template.content + '\n\n';
      });

      els.preview.textContent = content.trim();
      
      const lines = content.split('\n').length;
      els.stats.textContent = `${selectedTemplates.size} template${selectedTemplates.size > 1 ? 's' : ''} • ${lines} lines`;
    }

    // === Export ===
    function copyToClipboard() {
      const text = els.preview.textContent;
      if (!text || text.includes('Select templates')) return;
      
      navigator.clipboard.writeText(text);
      showToast('Copied to clipboard!');
    }

    function downloadFile() {
      const text = els.preview.textContent;
      if (!text || text.includes('Select templates')) return;
      
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '.gitignore';
      a.click();
      URL.revokeObjectURL(url);
      
      showToast('Downloaded .gitignore!');
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
