<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favicon Studio | SERAVIEL LABS</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --success: #10b981;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    
    .upload-zone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(13,148,136,0.03);
    }
    .upload-zone svg { width: 48px; height: 48px; stroke: var(--text-muted); margin-bottom: 12px; }
    .upload-zone p { color: var(--text-muted); font-size: 14px; }
    #file-input { display: none; }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 12px;
    }
    .icon-item {
      text-align: center;
    }
    .icon-preview {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .icon-preview img { width: 100%; height: 100%; object-fit: contain; }
    .icon-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
    input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); font-size: 14px; color: var(--text);
    }
    input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
    
    .output-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    textarea {
      width: 100%; height: 160px; padding: 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); font-family: var(--font-mono);
      font-size: 13px; color: var(--text); resize: none; line-height: 1.5;
    }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s;
      color: var(--text); font-size: 14px; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn svg { width: 18px; height: 18px; }
    
    .history-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .history-scroll {
      display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 8px;
      scrollbar-width: thin;
    }
    .history-item {
      flex: 0 0 80px; height: 80px; background: var(--bg); border-radius: 10px;
      border: 1px solid var(--border); cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s;
      overflow: hidden; position: relative;
    }
    .history-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .history-item img { width: 100%; height: 100%; object-fit: cover; }
    .history-item .label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7); color: white; font-size: 10px;
      text-align: center; padding: 2px;
    }
    
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: white; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
      <div class="logo">Favicon<span>Studio</span></div>
    </header>
    
    <div class="upload-zone" id="drop-zone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Drag & drop logo or click to upload</p>
      <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp, image/svg+xml">
    </div>
    
    <div id="workspace" style="display:none;">
      <div class="grid">
        <!-- Previews -->
        <div class="panel">
          <div class="panel-title">Generated Icons</div>
          <div class="icon-grid" id="icon-grid"></div>
        </div>
        
        <!-- Meta & Controls -->
        <div class="panel">
          <div class="panel-title">Configuration</div>
          <div class="form-group">
            <label>Site Name (for manifest)</label>
            <input type="text" id="site-name" value="My Website" placeholder="e.g. Seraviel Labs">
          </div>
          
          <div class="output-area">
            <label>HTML Meta Tags</label>
            <textarea id="meta-output" readonly></textarea>
            <div class="actions">
              <button class="btn primary" onclick="copyMeta()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy HTML
              </button>
              <button class="btn" onclick="exportZip()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export ZIP
              </button>
            </div>
          </div>
        </div>
      </div>
      
      <div class="history-panel">
        <div class="panel-title">Recent Generations</div>
        <div class="history-scroll" id="history-list"></div>
      </div>
    </div>
  </div>
  
  <canvas id="processor" style="display:none;"></canvas>
  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    const TARGETS = [
      { size: 16, name: 'favicon-16x16.png', label: '16x16' },
      { size: 32, name: 'favicon-32x32.png', label: '32x32' },
      { size: 180, name: 'apple-touch-icon.png', label: '180x180' },
      { size: 192, name: 'android-chrome-192x192.png', label: '192x192' },
      { size: 512, name: 'android-chrome-512x512.png', label: '512x512' }
    ];
    
    let generatedImages = [];
    
    const els = {
      dropZone: document.getElementById('drop-zone'),
      fileInput: document.getElementById('file-input'),
      workspace: document.getElementById('workspace'),
      iconGrid: document.getElementById('icon-grid'),
      siteName: document.getElementById('site-name'),
      metaOutput: document.getElementById('meta-output'),
      history: document.getElementById('history-list'),
      toast: document.getElementById('toast'),
      canvas: document.getElementById('processor')
    };

    document.addEventListener('DOMContentLoaded', () => {
      loadHistory();
      
      els.dropZone.addEventListener('click', () => els.fileInput.click());
      els.fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
      
      els.dropZone.addEventListener('dragover', e => { e.preventDefault(); els.dropZone.classList.add('dragover'); });
      els.dropZone.addEventListener('dragleave', () => els.dropZone.classList.remove('dragover'));
      els.dropZone.addEventListener('drop', e => {
        e.preventDefault();
        els.dropZone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      });
      
      els.siteName.addEventListener('input', updateMeta);
    });

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return showToast('Please upload a valid image');
      if (file.size > 5 * 1024 * 1024) return showToast('Image too large (max 5MB)');
      
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => processImage(img, file.name);
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function processImage(img, originalName) {
      generatedImages = [];
      els.iconGrid.innerHTML = '';
      
      TARGETS.forEach(target => {
        const dataUrl = cropAndResize(img, target.size);
        generatedImages.push({ ...target, dataUrl });
        
        const item = document.createElement('div');
        item.className = 'icon-item';
        item.innerHTML = `
          <div class="icon-preview"><img src="${dataUrl}" alt="${target.label}"></div>
          <div class="icon-label">${target.label}</div>
        `;
        els.iconGrid.appendChild(item);
      });
      
      updateMeta();
      saveToHistory(originalName, generatedImages[1].dataUrl);
      els.workspace.style.display = 'block';
      els.dropZone.style.display = 'none';
    }

    function cropAndResize(img, size) {
      const ctx = els.canvas.getContext('2d');
      els.canvas.width = size;
      els.canvas.height = size;
      
      const minDim = Math.min(img.width, img.height);
      const sx = (img.width - minDim) / 2;
      const sy = (img.height - minDim) / 2;
      
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, size, size);
      return els.canvas.toDataURL('image/png');
    }

    function updateMeta() {
      const name = els.siteName.value || 'My Website';
      const base = 'favicon';
      
      const html = `<!-- Favicon & Meta Tags -->
<link rel="icon" type="image/png" sizes="16x16" href="/${base}-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/${base}-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

<!-- Open Graph / Social -->
<meta property="og:image" content="/android-chrome-512x512.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta property="og:title" content="${name}">
<meta property="og:type" content="website">`;
      
      els.metaOutput.value = html;
    }

    window.copyMeta = function() {
      navigator.clipboard.writeText(els.metaOutput.value);
      showToast('Meta tags copied!');
    };

    window.exportZip = async function() {
      if (!generatedImages.length) return;
      try {
        const zip = new JSZip();
        const folder = zip.folder('favicons');
        
        generatedImages.forEach(img => {
          const base64 = img.dataUrl.split(',')[1];
          folder.file(img.name, base64, { base64: true });
        });
        
        const manifest = {
          name: els.siteName.value || 'My Website',
          short_name: (els.siteName.value || 'Site').split(' ')[0],
          icons: [
            { src: '/android-chrome-192x192.png', sizes: '192x192', type: 'image/png' },
            { src: '/android-chrome-512x512.png', sizes: '512x512', type: 'image/png' }
          ],
          theme_color: '#ffffff',
          background_color: '#ffffff',
          display: 'standalone'
        };
        folder.file('site.webmanifest', JSON.stringify(manifest, null, 2));
        
        const blob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'favicons.zip';
        a.click();
        URL.revokeObjectURL(url);
        showToast('ZIP downloaded!');
      } catch (err) {
        showToast('Export failed. Check console.');
        console.error(err);
      }
    };

    function saveToHistory(name, thumb) {
      let hist = JSON.parse(localStorage.getItem('seraviel_favicon_hist') || '[]');
      hist.unshift({ name: name.split('.')[0], thumb, date: new Date().toLocaleDateString() });
      if (hist.length > 6) hist.pop();
      localStorage.setItem('seraviel_favicon_hist', JSON.stringify(hist));
      loadHistory();
    }

    function loadHistory() {
      const hist = JSON.parse(localStorage.getItem('seraviel_favicon_hist') || '[]');
      els.history.innerHTML = '';
      if (hist.length === 0) {
        els.history.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px;">No generations yet</div>';
        return;
      }
      hist.forEach(h => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `<img src="${h.thumb}"><div class="label">${h.name}</div>`;
        el.title = `Restore: ${h.name}`;
        el.onclick = () => {
          const img = new Image();
          img.onload = () => processImage(img, h.name);
          img.src = h.thumb;
        };
        els.history.appendChild(el);
      });
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
