<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Generator | SERAVIEL LABS</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --success: #10b981;
      --danger: #ef4444;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', 'Monaco', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    textarea {
      width: 100%;
      min-height: 160px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
    
    .input-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn svg { width: 16px; height: 16px; }
    
    .hash-grid {
      display: grid;
      gap: 12px;
    }
    .hash-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      position: relative;
    }
    .hash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .algo-badge {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(13,148,136,0.1);
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .hash-value {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      line-height: 1.4;
      user-select: all;
    }
    .hash-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
    }
    
    .history-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 4px 0 8px;
      scrollbar-width: thin;
    }
    .history-item {
      flex: 0 0 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .history-item:hover { border-color: var(--accent); transform: translateY(-2px); }
    .history-input {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .history-hash {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: white; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    .warning {
      background: rgba(239,68,68,0.1);
      color: var(--danger);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <div class="logo">Hash<span>Generator</span></div>
    </header>
    
    <div class="warning" id="crypto-warning">
      Web Crypto API requires HTTPS. Hashing disabled on insecure connections.
    </div>
    
    <div class="grid">
      <!-- Input Panel -->
      <div class="panel">
        <div class="panel-title">Input Text</div>
        <textarea id="input-text" placeholder="Enter text to compute hashes..."></textarea>
        <div class="input-meta">
          <span id="char-count">0 characters</span>
          <span id="byte-count">0 bytes</span>
        </div>
        <div class="actions">
          <button class="btn primary" onclick="computeHashes()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Compute
          </button>
          <button class="btn" onclick="clearInput()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Clear
          </button>
        </div>
      </div>
      
      <!-- Output Panel -->
      <div class="panel">
        <div class="panel-title">
          <span>Results</span>
          <button class="btn btn-sm" onclick="copyAll()" id="copy-all-btn" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy All
          </button>
        </div>
        <div class="hash-grid" id="hash-grid">
          <div style="color:var(--text-muted); text-align:center; padding:40px 0;">Enter text and click Compute</div>
        </div>
      </div>
    </div>
    
    <div class="panel">
      <div class="panel-title">History</div>
      <div class="history-scroll" id="history-list"></div>
    </div>
  </div>
  
  <div class="toast" id="toast">Copied to clipboard!</div>

  <script>
    const ALGORITHMS = ['SHA-1', 'SHA-256', 'SHA-384', 'SHA-512'];
    const els = {
      input: document.getElementById('input-text'),
      charCount: document.getElementById('char-count'),
      byteCount: document.getElementById('byte-count'),
      grid: document.getElementById('hash-grid'),
      copyAllBtn: document.getElementById('copy-all-btn'),
      history: document.getElementById('history-list'),
      toast: document.getElementById('toast'),
      warning: document.getElementById('crypto-warning')
    };
    
    let lastResults = {};

    // Check Crypto API availability
    if (!window.crypto || !window.crypto.subtle) {
      els.warning.style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadHistory();
      
      els.input.addEventListener('input', () => {
        const text = els.input.value;
        els.charCount.textContent = `${text.length} characters`;
        els.byteCount.textContent = `${new TextEncoder().encode(text).length} bytes`;
      });
    });

    async function computeHashes() {
      const text = els.input.value.trim();
      if (!text) return showToast('Please enter text to hash');
      if (!window.crypto || !window.crypto.subtle) return showToast('Crypto API not available (use HTTPS)');
      
      els.grid.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">Computing...</div>';
      
      try {
        const encoder = new TextEncoder();
        const data = encoder.encode(text);
        const results = {};
        
        for (const algo of ALGORITHMS) {
          const hashBuffer = await crypto.subtle.digest(algo, data);
          results[algo] = bufferToHex(hashBuffer);
        }
        
        lastResults = results;
        renderResults(results);
        saveToHistory(text, results['SHA-256']);
      } catch (err) {
        els.grid.innerHTML = `<div style="color:var(--danger);text-align:center;padding:20px;">Error: ${err.message}</div>`;
      }
    }

    function bufferToHex(buffer) {
      return Array.from(new Uint8Array(buffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    function renderResults(results) {
      els.grid.innerHTML = '';
      els.copyAllBtn.style.display = 'inline-flex';
      
      Object.entries(results).forEach(([algo, hash]) => {
        const card = document.createElement('div');
        card.className = 'hash-card';
        card.innerHTML = `
          <div class="hash-header">
            <span class="algo-badge">${algo}</span>
          </div>
          <div class="hash-value" title="${hash}">${hash}</div>
          <div class="hash-actions">
            <button class="btn btn-sm" onclick="copyText('${hash}')">Copy</button>
            <button class="btn btn-sm" onclick="verifyHash('${hash}')">Verify</button>
          </div>
        `;
        els.grid.appendChild(card);
      });
    }

    window.copyText = function(text) {
      navigator.clipboard.writeText(text);
      showToast('Hash copied!');
    };

    window.copyAll = function() {
      const text = Object.entries(lastResults).map(([a, h]) => `${a}: ${h}`).join('\n');
      navigator.clipboard.writeText(text);
      showToast('All hashes copied!');
    };

    window.verifyHash = function(hash) {
      // Simple visual feedback, in real app could compare with external source
      showToast('Hash ready for verification');
    };

    window.clearInput = function() {
      els.input.value = '';
      els.charCount.textContent = '0 characters';
      els.byteCount.textContent = '0 bytes';
      els.grid.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:40px 0;">Enter text and click Compute</div>';
      els.copyAllBtn.style.display = 'none';
      lastResults = {};
    };

    function saveToHistory(text, primaryHash) {
      let hist = JSON.parse(localStorage.getItem('seraviel_hash_hist') || '[]');
      // Avoid duplicate consecutive entries
      if (hist[0]?.hash === primaryHash) return;
      
      hist.unshift({ input: text.substring(0, 30), hash: primaryHash, date: new Date().toLocaleDateString() });
      if (hist.length > 8) hist.pop();
      localStorage.setItem('seraviel_hash_hist', JSON.stringify(hist));
      loadHistory();
    }

    function loadHistory() {
      const hist = JSON.parse(localStorage.getItem('seraviel_hash_hist') || '[]');
      els.history.innerHTML = '';
      if (hist.length === 0) {
        els.history.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px;">No history yet</div>';
        return;
      }
      hist.forEach(h => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `
          <div class="history-input" title="${h.input}">${h.input}${h.input.length >= 30 ? '...' : ''}</div>
          <div class="history-hash">${h.hash.substring(0, 16)}...</div>
        `;
        el.onclick = () => {
          els.input.value = h.input;
          els.input.dispatchEvent(new Event('input'));
          computeHashes();
        };
        els.history.appendChild(el);
      });
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
