<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Runner | SERAVIEL LABS</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --danger: #ef4444;
      --success: #10b981;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; }
    
    .warning-box {
      background: rgba(245,158,11,0.1);
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }
    .warning-box svg { width: 18px; height: 18px; color: #f59e0b; flex-shrink: 0; margin-top: 2px; }
    
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .mode-switcher {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }
    .mode-btn {
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active { background: var(--accent); color: white; }
    
    .actions { display: flex; gap: 8px; }
    .btn {
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn svg { width: 16px; height: 16px; }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .panel-header {
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    #code-editor {
      flex: 1;
      width: 100%;
      min-height: 300px;
      padding: 16px;
      border: none;
      background: var(--surface);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      resize: vertical;
      outline: none;
      white-space: pre;
      tab-size: 2;
    }
    
    #preview-frame {
      flex: 1;
      width: 100%;
      min-height: 300px;
      border: none;
      background: white;
    }
    
    .console-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .console-header {
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #console-output {
      max-height: 150px;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--surface);
      color: var(--text);
    }
    .log-entry { padding: 4px 0; border-bottom: 1px solid var(--border); }
    .log-entry:last-child { border-bottom: none; }
    .log-entry.error { color: var(--danger); }
    .log-entry.warn { color: #f59e0b; }
    .log-entry.info { color: var(--accent); }
    
    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }
    .meta-item { display: flex; align-items: center; gap: 6px; }
    .meta-item svg { width: 14px; height: 14px; }
    
    .history-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .history-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 12px;
      color: var(--text);
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }
    .history-item:hover { background: var(--border); }
    .history-info { flex: 1; min-width: 0; }
    .history-name { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .history-actions { display: flex; gap: 6px; margin-left: 12px; }
    .history-btn {
      padding: 4px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .history-btn:hover { color: var(--accent); border-color: var(--accent); }
    
    .templates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .template-card {
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .template-card:hover { border-color: var(--accent); color: var(--accent); }
    
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .actions { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Back to Hub
      </a>
      <div class="logo">Script<span>Runner</span></div>
    </header>
    
    <div class="warning-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span>Code runs in a sandboxed iframe. Do not paste untrusted scripts. Max size: 50KB.</span>
    </div>
    
    <div class="toolbar">
      <div class="mode-switcher">
        <button class="mode-btn active" data-mode="html">HTML</button>
        <button class="mode-btn" data-mode="js">JavaScript</button>
        <button class="mode-btn" data-mode="css">CSS</button>
      </div>
      <div class="actions">
        <button class="btn" onclick="loadTemplate()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Templates
        </button>
        <button class="btn" onclick="saveToHistory()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save
        </button>
        <button class="btn primary" onclick="runScript()" id="run-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Run
        </button>
      </div>
    </div>
    
    <div class="grid">
      <div class="panel">
        <div class="panel-header">
          <span>Editor</span>
          <span id="editor-meta" style="font-size:11px;color:var(--text-muted)">0 bytes</span>
        </div>
        <textarea id="code-editor" spellcheck="false" placeholder="Write your code here..."></textarea>
        <div class="meta-bar">
          <div class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span id="exec-time">--</span>
          </div>
          <div class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="share-status">Not shared</span>
          </div>
        </div>
      </div>
      
      <div class="panel">
        <div class="panel-header">Preview</div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" title="Preview"></iframe>
      </div>
    </div>
    
    <div class="console-panel">
      <div class="console-header">
        <span>Console Output</span>
        <button class="btn" onclick="clearConsole()" style="padding:4px 10px;font-size:11px;">Clear</button>
      </div>
      <div id="console-output"></div>
    </div>
    
    <div class="history-section">
      <div class="history-title">Recent Runs</div>
      <div class="history-list" id="history-list"></div>
    </div>
    
    <div class="templates-grid" id="templates-list" style="display:none;">
      <div class="template-card" onclick="setTemplate('hello')">Hello World</div>
      <div class="template-card" onclick="setTemplate('dom')">DOM Manipulator</div>
      <div class="template-card" onclick="setTemplate('fetch')">Fetch API</div>
      <div class="template-card" onclick="setTemplate('css')">CSS Animation</div>
      <div class="template-card" onclick="setTemplate('console')">Console Test</div>
      <div class="template-card" onclick="setTemplate('empty')">Empty</div>
    </div>
  </div>
  
  <div class="toast" id="toast">Action completed</div>

  <script>
    const TEMPLATES = {
      hello: `<!DOCTYPE html>
<html>
<head><style>body{font-family:system-ui;padding:20px;background:#f8fafc;color:#0f172a}</style></head>
<body>
  <h1>Hello from Script Runner! 👋</h1>
  <p>Edit this code and click Run.</p>
  <script>console.log('Page loaded');<\/script>
</body>
</html>`,
      dom: `<!DOCTYPE html>
<html>
<body style="font-family:system-ui;padding:20px">
  <button id="btn">Click me</button>
  <p id="output">Click the button</p>
  <script>
    document.getElementById('btn').onclick = () => {
      document.getElementById('output').textContent = 'Button clicked!';
      console.log('Button clicked at', new Date().toLocaleTimeString());
    };
  <\/script>
</body>
</html>`,
      fetch: `<!DOCTYPE html>
<html>
<body style="font-family:system-ui;padding:20px">
  <div id="result">Loading...</div>
  <script>
    fetch('https://api.github.com')
      .then(r => r.json())
      .then(d => {
        document.getElementById('result').textContent = 'GitHub API: ' + d.current_user_url;
        console.log('Fetched:', d);
      })
      .catch(e => {
        document.getElementById('result').textContent = 'Error: ' + e.message;
        console.error(e);
      });
  <\/script>
</body>
</html>`,
      css: `<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #f8fafc, #e2e8f0); }
  .box { width: 100px; height: 100px; background: #0d9488; border-radius: 12px; animation: bounce 1s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-30px); } }
</style>
</head>
<body>
  <div class="box"></div>
  <script>console.log('CSS animation running');<\/script>
</body>
</html>`,
      console: `// JavaScript mode - console output only
console.log('Script Runner Console Test');
console.warn('This is a warning');
console.error('This is an error');
console.log('Current time:', new Date().toLocaleTimeString());
// Return a value to see it in preview
"Done!"`,
      empty: ``
    };

    const els = {
      editor: document.getElementById('code-editor'),
      preview: document.getElementById('preview-frame'),
      console: document.getElementById('console-output'),
      runBtn: document.getElementById('run-btn'),
      editorMeta: document.getElementById('editor-meta'),
      execTime: document.getElementById('exec-time'),
      shareStatus: document.getElementById('share-status'),
      history: document.getElementById('history-list'),
      templates: document.getElementById('templates-list'),
      toast: document.getElementById('toast'),
      modeBtns: document.querySelectorAll('.mode-btn')
    };

    let currentMode = 'html';
    let lastExecTime = null;

    document.addEventListener('DOMContentLoaded', () => {
      loadHistory();
      updateMeta();
      
      // Mode switcher
      els.modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          els.modeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
          updatePlaceholder();
        });
      });
      
      // Editor input
      els.editor.addEventListener('input', () => {
        updateMeta();
        // Auto-run for JS mode (debounced)
        if (currentMode === 'js') {
          clearTimeout(autoRunTimer);
          autoRunTimer = setTimeout(() => runScript(), 500);
        }
      });
      
      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
          e.preventDefault();
          runScript();
        }
        if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          saveToHistory();
        }
      });
      
      // Load from URL params
      const params = new URLSearchParams(window.location.search);
      const src = params.get('src');
      const mode = params.get('mode');
      if (src && mode) {
        try {
          currentMode = mode;
          els.modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
          els.editor.value = atob(src);
          updatePlaceholder();
          updateMeta();
          runScript();
          showToast('Loaded from URL');
        } catch (e) {
          console.error('Failed to decode URL', e);
        }
      }
    });

    let autoRunTimer;
    function updatePlaceholder() {
      const placeholders = {
        html: '<!DOCTYPE html>\n<html>\n<body>\n  <!-- Write HTML here -->\n</body>\n</html>',
        js: '// Write JavaScript here\nconsole.log("Hello");',
        css: '/* Write CSS here */\nbody {\n  background: #f8fafc;\n}'
      };
      els.editor.placeholder = placeholders[currentMode];
    }

    function updateMeta() {
      const code = els.editor.value;
      const bytes = new Blob([code]).size;
      els.editorMeta.textContent = `${bytes} bytes`;
      if (bytes > 50 * 1024) {
        els.editorMeta.style.color = 'var(--danger)';
        els.editorMeta.textContent += ' (⚠️ over limit)';
      } else {
        els.editorMeta.style.color = 'var(--text-muted)';
      }
    }

    function runScript() {
      const code = els.editor.value;
      const start = performance.now();
      
      // Clear previous console
      clearConsole();
      
      if (currentMode === 'html') {
        // Inject console interceptor into HTML
        const enhancedCode = code.replace('</body>', `
          <script>
            (function() {
              const send = (type, args) => parent.postMessage({ type: 'console', level: type, args: Array.from(args) }, '*');
              ['log','warn','error','info'].forEach(m => {
                const orig = console[m];
                console[m] = (...a) => { send(m, a); orig.apply(console, a); };
              });
              window.onerror = (msg, src, line) => { send('error', [\`Error at \${line}: \${msg}\`]); };
            })();
          <\/script>
          </body>`);
        els.preview.srcdoc = enhancedCode;
      } else if (currentMode === 'js') {
        // Wrap JS code with console interceptor
        const wrapped = `
          (function() {
            const send = (type, args) => parent.postMessage({ type: 'console', level: type, args: Array.from(args) }, '*');
            ['log','warn','error','info'].forEach(m => {
              const orig = console[m];
              console[m] = (...a) => { send(m, a); orig.apply(console, a); };
            });
            try {
              const result = (function() { ${code} })();
              if (result !== undefined) send('log', [result]);
            } catch (e) { send('error', [e.message]); }
          })();
        `;
        els.preview.srcdoc = `<!DOCTYPE html><html><body><script>${wrapped}<\/script></body></html>`;
      } else if (currentMode === 'css') {
        // CSS mode: apply to a preview page
        els.preview.srcdoc = `<!DOCTYPE html><html><head><style>${code}</style></head><body style="font-family:system-ui;padding:20px"><h3>CSS Preview</h3><div class="preview-box" style="width:100px;height:100px;background:#0d9488;border-radius:8px;margin-top:20px"></div></body></html>`;
      }
      
      // Measure execution time (approximate)
      lastExecTime = performance.now() - start;
      els.execTime.textContent = `${lastExecTime.toFixed(1)} ms`;
      
      // Update share status
      els.shareStatus.textContent = 'Ready to share';
      els.shareStatus.style.color = 'var(--success)';
    }

    // Listen for console messages from iframe
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'console') {
        const { level, args } = e.data;
        args.forEach(arg => {
          const entry = document.createElement('div');
          entry.className = `log-entry ${level}`;
          entry.textContent = typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
          els.console.appendChild(entry);
        });
        els.console.scrollTop = els.console.scrollHeight;
      }
    });

    window.clearConsole = function() {
      els.console.innerHTML = '';
    };

    window.loadTemplate = function() {
      els.templates.style.display = els.templates.style.display === 'none' ? 'grid' : 'none';
    };

    window.setTemplate = function(name) {
      els.editor.value = TEMPLATES[name] || '';
      updatePlaceholder();
      updateMeta();
      els.templates.style.display = 'none';
      showToast(`Template "${name}" loaded`);
      if (currentMode === 'js') runScript();
    };

    window.saveToHistory = function() {
      const code = els.editor.value.trim();
      if (!code) return showToast('Nothing to save');
      
      const item = {
        id: Date.now(),
        name: `Script ${new Date().toLocaleTimeString()}`,
        code,
        mode: currentMode,
        timestamp: Date.now()
      };
      
      let history = JSON.parse(localStorage.getItem('seraviel_runner_hist') || '[]');
      history.unshift(item);
      if (history.length > 10) history.pop();
      localStorage.setItem('seraviel_runner_hist', JSON.stringify(history));
      
      loadHistory();
      showToast('Saved to history');
    };

    function loadHistory() {
      const history = JSON.parse(localStorage.getItem('seraviel_runner_hist') || '[]');
      els.history.innerHTML = '';
      
      if (history.length === 0) {
        els.history.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px;">No runs yet</div>';
        return;
      }
      
      history.forEach(item => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML = `
          <div class="history-info">
            <div class="history-name">${item.name}</div>
            <div class="history-meta">${item.mode.toUpperCase()} · ${new Date(item.timestamp).toLocaleDateString()}</div>
          </div>
          <div class="history-actions">
            <button class="history-btn" onclick="loadFromHistory(${item.id})">Load</button>
            <button class="history-btn" onclick="shareScript(${item.id})">Share</button>
          </div>
        `;
        els.history.appendChild(el);
      });
    }

    window.loadFromHistory = function(id) {
      const history = JSON.parse(localStorage.getItem('seraviel_runner_hist') || '[]');
      const item = history.find(i => i.id === id);
      if (item) {
        currentMode = item.mode;
        els.modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === item.mode));
        els.editor.value = item.code;
        updatePlaceholder();
        updateMeta();
        runScript();
        showToast('Loaded from history');
      }
    };

    window.shareScript = function(id) {
      const history = JSON.parse(localStorage.getItem('seraviel_runner_hist') || '[]');
      const item = history.find(i => i.id === id);
      if (!item) return;
      
      const encoded = btoa(item.code);
      const url = `${location.origin}${location.pathname}?src=${encoded}&mode=${item.mode}`;
      
      navigator.clipboard.writeText(url);
      els.shareStatus.textContent = 'Link copied!';
      els.shareStatus.style.color = 'var(--success)';
      showToast('Share link copied');
    };

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
