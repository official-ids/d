<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Master | SERAVIEL LABS</title>
  <meta name="description" content="Advanced local task manager with categories and progress tracking.">
  <meta name="keywords" content="todo, tasks, productivity, manager">
  <style>
    /* === SERAVIEL LABS Design System === */
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.05);
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      
      /* Category Colors */
      --cat-personal: #3b82f6;
      --cat-work: #8b5cf6;
      --cat-urgent: #ef4444;
      --cat-general: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    .container { max-width: 700px; margin: 0 auto; }
    
    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .header h1 svg { width: 24px; height: 24px; stroke: var(--accent); }
    
    /* Progress Bar */
    .progress-container {
      background: var(--surface);
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* Input Area */
    .input-area {
      background: var(--surface);
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: flex;
      gap: 10px;
    }
    .input-area input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .input-area input[type="text"]:focus { border-color: var(--accent); }
    .input-area select {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--bg);
      outline: none;
    }
    .btn-add {
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: background 0.2s;
    }
    .btn-add:hover { background: var(--accent-hover); }
    .btn-add svg { width: 18px; height: 18px; }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-muted);
    }
    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* Task List */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .task-item:hover { border-color: var(--accent); }
    .task-item.completed { opacity: 0.6; }
    .task-item.completed .task-text { text-decoration: line-through; color: var(--text-muted); }
    
    /* Custom Checkbox */
    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .checkbox:hover { border-color: var(--accent); }
    .task-item.completed .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkbox svg { width: 14px; height: 14px; stroke: white; opacity: 0; }
    .task-item.completed .checkbox svg { opacity: 1; }

    .task-content { flex: 1; }
    .task-text { font-size: 14px; font-weight: 500; }
    .task-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      font-size: 11px;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 10px;
      color: white;
      font-weight: 500;
    }
    .badge.personal { background: var(--cat-personal); }
    .badge.work { background: var(--cat-work); }
    .badge.urgent { background: var(--cat-urgent); }
    .badge.general { background: var(--cat-general); }
    .date { color: var(--text-muted); }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 4px;
      transition: all 0.2s;
      display: flex;
    }
    .btn-delete:hover { background: #fee2e2; color: var(--danger); }
    .btn-delete svg { width: 18px; height: 18px; }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.3; }
    
    /* Footer Actions */
    .footer-actions {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn-text {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-text:hover { color: var(--danger); }
    .btn-text svg { width: 16px; height: 16px; }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 20000;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 14px 18px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text);
      min-width: 280px;
      max-width: 400px;
      animation: toastIn 0.3s ease-out forwards;
      opacity: 0;
      transform: translateX(100%);
    }
    .toast.success { border-left-color: #22c55e; }
    .toast-icon { flex-shrink: 0; width: 20px; height: 20px; }
    .toast-content { flex: 1; }
    .toast-close {
      background: none; border: none; padding: 4px;
      cursor: pointer; opacity: 0.6; transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .toast-close:hover { opacity: 1; }
    .toast-close svg { width: 16px; height: 16px; }
    @keyframes toastIn { to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(100%); } }

    @media (max-width: 600px) {
      .input-area { flex-direction: column; }
      .input-area select { width: 100%; }
      .btn-add { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        Task Master
      </h1>
    </div>

    <!-- Progress -->
    <div class="progress-container">
      <div class="progress-stats">
        <span id="statsText">0 of 0 tasks completed</span>
        <span id="statsPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="What needs to be done?">
      <select id="categorySelect">
        <option value="general">General</option>
        <option value="personal">Personal</option>
        <option value="work">Work</option>
        <option value="urgent">Urgent</option>
      </select>
      <button class="btn-add" onclick="addTask()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('active')">Active</button>
      <button class="filter-btn" onclick="setFilter('completed')">Completed</button>
    </div>

    <!-- List -->
    <ul class="task-list" id="taskList">
      <!-- Tasks go here -->
    </ul>

    <!-- Empty State (Hidden by default) -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <p>No tasks found.</p>
    </div>

    <!-- Footer -->
    <div class="footer-actions">
      <button class="btn-text" onclick="exportTasks()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export JSON
      </button>
      <button class="btn-text" onclick="clearCompleted()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Clear Completed
      </button>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    // === Toast System ===
    function toast(message, type = 'success', duration = 4000) {
      const globalToast = typeof window.toast === 'function' ? window.toast : null;
      if (globalToast && globalToast !== toast) { globalToast(message, type, duration); return; }
      const container = document.getElementById('toast-container');
      if (!container) return;
      const icons = {
        success: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>',
        error: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
        warning: '<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>'
      };
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `${icons[type] || icons.success}<div class="toast-content">${message}</div><button class="toast-close" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>`;
      el.querySelector('.toast-close').onclick = () => removeToast(el);
      container.appendChild(el);
      const timer = setTimeout(() => removeToast(el), duration);
      el.onmouseenter = () => clearTimeout(timer);
    }
    function removeToast(el) {
      el.style.animation = 'toastOut 0.3s ease-out forwards';
      setTimeout(() => el.remove(), 300);
    }

    // === Logic ===
    let tasks = JSON.parse(localStorage.getItem('seraviel_tasks')) || [];
    let currentFilter = 'all';

    function saveTasks() {
      localStorage.setItem('seraviel_tasks', JSON.stringify(tasks));
      render();
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const category = document.getElementById('categorySelect').value;
      const text = input.value.trim();
      
      if (!text) {
        toast('Please enter a task', 'warning');
        return;
      }

      const newTask = {
        id: Date.now(),
        text,
        category,
        completed: false,
        createdAt: new Date().toLocaleDateString()
      };

      tasks.unshift(newTask);
      input.value = '';
      saveTasks();
      toast('Task added', 'success');
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        saveTasks();
      }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      toast('Task deleted', 'success');
    }

    function clearCompleted() {
      const completedCount = tasks.filter(t => t.completed).length;
      if (completedCount === 0) {
        toast('No completed tasks to clear', 'warning');
        return;
      }
      tasks = tasks.filter(t => !t.completed);
      saveTasks();
      toast(`Cleared ${completedCount} tasks`, 'success');
    }

    function exportTasks() {
      if (tasks.length === 0) {
        toast('Nothing to export', 'warning');
        return;
      }
      const blob = new Blob([JSON.stringify(tasks, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `tasks-${Date.now()}.json`;
      a.click(); URL.revokeObjectURL(url);
      toast('Tasks exported', 'success');
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('taskList');
      const emptyState = document.getElementById('emptyState');
      list.innerHTML = '';

      const filteredTasks = tasks.filter(task => {
        if (currentFilter === 'active') return !task.completed;
        if (currentFilter === 'completed') return task.completed;
        return true;
      });

      if (filteredTasks.length === 0) {
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
        filteredTasks.forEach(task => {
          const li = document.createElement('li');
          li.className = `task-item ${task.completed ? 'completed' : ''}`;
          li.innerHTML = `
            <div class="checkbox" onclick="toggleTask(${task.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="task-content">
              <div class="task-text">${task.text}</div>
              <div class="task-meta">
                <span class="badge ${task.category}">${task.category}</span>
                <span class="date">${task.createdAt}</span>
              </div>
            </div>
            <button class="btn-delete" onclick="deleteTask(${task.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            </button>
          `;
          list.appendChild(li);
        });
      }

      // Update Stats
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
      
      document.getElementById('statsText').textContent = `${completed} of ${total} tasks completed`;
      document.getElementById('statsPercent').textContent = `${percent}%`;
      document.getElementById('progressFill').style.width = `${percent}%`;
    }

    // Enter key support
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    // Init
    render();
    toast('Task Master ready', 'success', 3000);
  </script>
</body>
</html>
