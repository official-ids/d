<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Builder | SERAVIEL LABS</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --danger: #ef4444;
      --success: #10b981;
      --radius: 12px;
      --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      line-height: 1.5;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    }
    .panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      font-size: 14px;
      color: var(--text);
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
    }
    
    .params-list { display: flex; flex-direction: column; gap: 12px; }
    .param-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: center;
      background: var(--bg);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    
    .btn-icon {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon:hover { background: var(--border); color: var(--danger); }
    .btn-icon svg { width: 18px; height: 18px; }
    
    .btn-add {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px dashed var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(13,148,136,0.05); }
    
    .output-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
      word-break: break-all;
      margin-bottom: 16px;
      min-height: 80px;
      display: flex;
      align-items: center;
    }
    
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }
    .btn:hover { background: var(--border); }
    .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.primary:hover { background: var(--accent-hover); }
    .btn svg { width: 18px; height: 18px; }
    
    .history-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 4px 0 8px;
      scrollbar-width: thin;
    }
    .history-item {
      flex: 0 0 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      color: var(--text-muted);
    }
    .history-item:hover { border-color: var(--accent); color: var(--text); transform: translateY(-2px); }
    
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: white; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 600; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .param-row { grid-template-columns: 1fr 1fr auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <div class="logo">URL<span>Builder</span></div>
    </header>
    
    <div class="grid">
      <!-- Left: Configuration -->
      <div class="panel">
        <div class="panel-title">Configuration</div>
        
        <div class="form-group">
          <label>Base URL</label>
          <input type="text" id="base-url" placeholder="https://example.com/api" value="https://example.com">
        </div>
        
        <div class="form-group">
          <label>Parameters</label>
          <div class="params-list" id="params-list">
            <!-- Rows injected by JS -->
          </div>
          <button class="btn-add" onclick="addParam()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Parameter
          </button>
        </div>
      </div>
      
      <!-- Right: Output & Actions -->
      <div class="panel">
        <div class="panel-title">Result</div>
        
        <div class="output-box" id="output-url">https://example.com</div>
        
        <div class="actions">
          <button class="btn primary" onclick="copyURL()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy URL
          </button>
          <button class="btn" onclick="reset()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Reset
          </button>
        </div>
        
        <div class="panel-title" style="margin-top: 24px;">History</div>
        <div class="history-scroll" id="history-list"></div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast">URL Copied!</div>

  <script>
    let params = [
      { key: 'q', value: 'shoes' },
      { key: 'sort', value: 'price' }
    ];
    
    const els = {
      base: document.getElementById('base-url'),
      list: document.getElementById('params-list'),
      output: document.getElementById('output-url'),
      history: document.getElementById('history-list'),
      toast: document.getElementById('toast')
    };
    
    document.addEventListener('DOMContentLoaded', () => {
      loadHistory();
      renderParams();
      updateOutput();
      
      els.base.addEventListener('input', updateOutput);
    });
    
    function renderParams() {
      els.list.innerHTML = '';
      params.forEach((param, index) => {
        const row = document.createElement('div');
        row.className = 'param-row';
        row.innerHTML = `
          <input type="text" placeholder="Key" value="${param.key}" oninput="updateParam(${index}, 'key', this.value)">
          <input type="text" placeholder="Value" value="${param.value}" oninput="updateParam(${index}, 'value', this.value)">
          <button class="btn-icon" onclick="removeParam(${index})" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        `;
        els.list.appendChild(row);
      });
    }
    
    window.addParam = function() {
      params.push({ key: '', value: '' });
      renderParams();
      updateOutput();
      // Focus new input
      const inputs = els.list.querySelectorAll('input');
      inputs[inputs.length - 2].focus();
    };
    
    window.removeParam = function(index) {
      params.splice(index, 1);
      renderParams();
      updateOutput();
    };
    
    window.updateParam = function(index, field, val) {
      params[index][field] = val;
      updateOutput();
    };
    
    function updateOutput() {
  let url = els.base.value.trim();
  // Убираем старый query string, если есть
  if (url.includes('?')) {
    url = url.split('?')[0];
  }
  
  const validParams = params.filter(p => p.key.trim() !== '');
  
  if (validParams.length > 0) {
    // ✅ ПРАВИЛЬНЫЙ СПОСОБ:
    const searchParams = new URLSearchParams();
    validParams.forEach(p => searchParams.append(p.key, p.value));
    url += '?' + searchParams.toString();
  }
  
  els.output.textContent = url;
  
  // Сохранение в историю
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToHistory(url), 1000);
}
    
    window.copyURL = function() {
      navigator.clipboard.writeText(els.output.textContent);
      showToast('URL Copied!');
      saveToHistory(els.output.textContent); // Force save on copy
    };
    
    window.reset = function() {
      els.base.value = 'https://example.com';
      params = [];
      renderParams();
      updateOutput();
    };
    
    // History
    let saveTimer;
    function saveToHistory(url) {
      if (!url || !url.includes('?')) return;
      let hist = JSON.parse(localStorage.getItem('seraviel_url_hist') || '[]');
      if (hist[0]?.url === url) return;
      hist.unshift({ url, date: new Date().toLocaleDateString() });
      if (hist.length > 8) hist.pop();
      localStorage.setItem('seraviel_url_hist', JSON.stringify(hist));
      loadHistory();
    }
    
    function loadHistory() {
      const hist = JSON.parse(localStorage.getItem('seraviel_url_hist') || '[]');
      els.history.innerHTML = '';
      if (hist.length === 0) {
        els.history.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px;">No history yet</div>';
        return;
      }
      hist.forEach(h => {
        const el = document.createElement('div');
        el.className = 'history-item';
        el.textContent = h.url;
        el.title = h.url;
        el.onclick = () => {
          // Restore state logic could be complex, just copy for now
          navigator.clipboard.writeText(h.url);
          showToast('Restored from history!');
        };
        els.history.appendChild(el);
      });
    }
    
    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
