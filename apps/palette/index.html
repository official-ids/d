<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette Studio | SERAVIEL LABS</title>
  <meta name="description" content="Professional color palette generator with locking, export and sharing.">
  
  <!-- === SYSTEM ASSETS === -->
  <link rel="stylesheet" href="/toast.css">
  <script src="/toast.js"></script>

  <style>
    /* === SERAVIEL LABS Light Theme === */
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* === Header === */
    header {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.5px;
    }
    .brand svg { stroke: var(--accent); width: 24px; height: 24px; }
    
    .controls { display: flex; gap: 12px; align-items: center; }
    
    .shortcut-hint {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 4px 8px;
      border-radius: 6px;
      font-family: var(--font-mono);
      border: 1px solid var(--border);
      margin-right: 8px;
    }

    /* === Buttons === */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .btn:hover { background: var(--bg); border-color: var(--text-muted); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn svg { width: 16px; height: 16px; }

    /* === Palette Area === */
    main { flex: 1; display: flex; overflow: hidden; }
    .palette-container {
      flex: 1;
      display: flex;
      width: 100%;
    }
    .color-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background-color 0.4s ease;
      cursor: pointer;
      border-right: 1px solid rgba(0,0,0,0.05);
    }
    .color-col:last-child { border-right: none; }
    .color-col:hover { filter: brightness(0.98); }

    .color-info {
      text-align: center;
      transition: transform 0.2s;
      background: rgba(255,255,255,0.9);
      padding: 20px 24px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .color-col:hover .color-info { transform: scale(1.03); }
    
    .hex-code { 
      font-size: 20px; 
      font-weight: 700; 
      font-family: var(--font-mono); 
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .rgb-code { 
      font-size: 13px; 
      color: var(--text-muted); 
      font-family: var(--font-mono); 
    }
    .click-hint {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .color-col:hover .click-hint { opacity: 1; }

    /* === Lock Button === */
    .lock-btn {
      position: absolute;
      top: 20px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
    }
    .color-col:hover .lock-btn { opacity: 1; }
    .lock-btn:hover { background: var(--bg); border-color: var(--text-muted); }
    .lock-btn.locked { 
      opacity: 1; 
      background: var(--accent); 
      border-color: var(--accent); 
    }
    .lock-btn.locked svg { stroke: white; }
    .lock-btn svg { width: 18px; height: 18px; stroke: var(--text); transition: stroke 0.2s; }

    /* === Saved Palettes === */
    .saved-area {
      height: 200px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      overflow-y: auto;
      display: none;
    }
    .saved-area.active { display: block; }
    .saved-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .saved-header span {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 13px;
    }
    .saved-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .saved-item {
      height: 60px;
      border-radius: 8px;
      display: flex;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }
    .saved-item:hover { 
      border-color: var(--accent); 
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .saved-item div { flex: 1; transition: flex 0.2s; }
    .saved-item:hover div { flex: 1.2; }

    /* === Mobile === */
    @media (max-width: 768px) {
      .palette-container { flex-direction: column; }
      .color-col { border-right: none; border-bottom: 1px solid rgba(0,0,0,0.05); }
      .color-col:last-child { border-bottom: none; }
      .hex-code { font-size: 18px; }
      .controls { gap: 8px; }
      .btn span { display: none; }
      .shortcut-hint { display: none; }
    }

    /* === Toast Position Override === */
    .toast-container { bottom: 24px !important; top: auto !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="1" fill="currentColor"/>
        <path d="M12 2a14.5 14.5 0 0 0-7 18 14.5 14.5 0 0 0 14 0 14.5 14.5 0 0 0-7-18z"/>
      </svg>
      Palette Studio
    </div>
    <div class="controls">
      <span class="shortcut-hint">SPACE to Generate</span>
      <button class="btn" onclick="toggleSaved()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>Saved</span>
      </button>
      <button class="btn" onclick="exportCSS()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>Export CSS</span>
      </button>
<button class="btn" onclick="savePalette()" title="Save palette (Ctrl+S)">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 12 8"/></svg>
  <span>Save</span>
</button>
      <button class="btn primary" onclick="generate()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span>Generate</span>
      </button>
    </div>
  </header>

  <!-- Palette -->
  <main>
    <div class="palette-container" id="palette"></div>
  </main>

  <!-- Saved Area -->
  <div class="saved-area" id="saved-area">
    <div class="saved-header">
      <span>Saved Palettes</span>
      <button class="btn" style="padding:4px 10px;font-size:12px" onclick="clearSaved()">Clear All</button>
    </div>
    <div class="saved-grid" id="saved-grid"></div>
  </div>

  <script>
    // === State ===
    let palette = [];
    let locks = [false, false, false, false, false];
    const COLS_COUNT = 5;

    // === Init ===
    document.addEventListener('DOMContentLoaded', () => {
      // Load from URL if present
      const urlColors = parseUrlColors();
      if (urlColors && urlColors.length === COLS_COUNT) {
        palette = urlColors;
      } else {
        generate(true);
      }
      renderPalette();
      renderSaved();
      
      // Init toast system
      if (window.toast && window.toast.config) {
        window.toast.config({ position: 'bottom-center', duration: 2500 });
      }
    });

    // === Core Logic ===
    function generate(isInitial = false) {
      if (isInitial) {
        palette = Array.from({ length: COLS_COUNT }, () => getRandomHex());
      } else {
        palette = palette.map((color, i) => locks[i] ? color : getRandomHex());
      }
      renderPalette();
      updateUrl();
    }

    function getRandomHex() {
      return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0').toUpperCase();
    }

    function renderPalette() {
      const container = document.getElementById('palette');
      container.innerHTML = '';

      palette.forEach((hex, index) => {
        const col = document.createElement('div');
        col.className = 'color-col';
        col.style.backgroundColor = hex;
        
        const textColor = getContrastColor(hex);
        
        col.innerHTML = `
          <button class="lock-btn ${locks[index] ? 'locked' : ''}" onclick="toggleLock(event, ${index})" title="${locks[index] ? 'Unlock' : 'Lock'} color">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              ${locks[index] 
                ? '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>' 
                : '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>'}
            </svg>
          </button>
          
          <div class="color-info">
            <div class="hex-code">${hex}</div>
            <div class="rgb-code">${hexToRgb(hex)}</div>
          </div>
          
          <div class="click-hint">Click to copy</div>
        `;

        col.addEventListener('click', (e) => {
          if (!e.target.closest('.lock-btn')) {
            copyToClipboard(hex);
          }
        });

        container.appendChild(col);
      });
    }

    // === Actions ===
    window.toggleLock = function(e, index) {
      e.stopPropagation();
      locks[index] = !locks[index];
      renderPalette();
      updateUrl();
    };

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        toast.success(`Copied ${text}`, { duration: 2000 });
      }).catch(() => {
        toast.error('Failed to copy', { duration: 3000 });
      });
    }

    function getContrastColor(hex) {
      const r = parseInt(hex.substr(1, 2), 16);
      const g = parseInt(hex.substr(3, 2), 16);
      const b = parseInt(hex.substr(5, 2), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.5 ? '#0f172a' : '#ffffff';
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.substr(1, 2), 16);
      const g = parseInt(hex.substr(3, 2), 16);
      const b = parseInt(hex.substr(5, 2), 16);
      return `rgb(${r}, ${g}, ${b})`;
    }

    // === Export CSS Variables ===
    window.exportCSS = function() {
      const css = palette.map((hex, i) => `  --color-${i + 1}: ${hex};`).join('\n');
      const output = `:root {\n${css}\n}`;
      
      navigator.clipboard.writeText(output).then(() => {
        toast.success('CSS variables copied!', { 
          duration: 3000,
          actions: [
            {
              label: 'View Code',
              id: 'view',
              onClick: () => {
                const w = window.open('', '_blank');
                w.document.write(`<pre style="font-family:monospace;padding:20px;background:#0d1117;color:#c9d1d9">${output}</pre>`);
              }
            }
          ]
        });
      });
    };

    // === Saved Palettes ===
    window.toggleSaved = function() {
      document.getElementById('saved-area').classList.toggle('active');
    };

    window.savePalette = function() {
      let saved = JSON.parse(localStorage.getItem('seraviel_palettes') || '[]');
      const entry = { colors: [...palette], date: new Date().toISOString() };
      saved.unshift(entry);
      if (saved.length > 20) saved.pop();
      localStorage.setItem('seraviel_palettes', JSON.stringify(saved));
      renderSaved();
      toast.success('Palette saved', { duration: 2000 });
    };

    window.clearSaved = function() {
      if (confirm('Clear all saved palettes?')) {
        localStorage.removeItem('seraviel_palettes');
        renderSaved();
        toast.info('Saved palettes cleared');
      }
    };

        function renderSaved() {
      const grid = document.getElementById('saved-grid');
      const raw = localStorage.getItem('seraviel_palettes');
      
      // Парсинг с защитой от ошибок
      let saved = [];
      try {
        saved = raw ? JSON.parse(raw) : [];
      } catch(e) {
        console.warn('Failed to parse saved palettes', e);
        saved = [];
      }
      
      grid.innerHTML = '';
      
      if (!Array.isArray(saved) || saved.length === 0) {
        grid.innerHTML = `<div style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:20px">No saved palettes yet</div>`;
        return;
      }

      saved.forEach((item, idx) => {
        // Поддержка старого формата (просто массив) и нового (объект с colors)
        const colors = Array.isArray(item) ? item : (item.colors || []);
        if (!Array.isArray(colors) || colors.length === 0) return;
        
        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        
        const itemEl = document.createElement('div');
        itemEl.className = 'saved-item';
        itemEl.title = 'Load this palette';
        itemEl.onclick = () => {
          palette = [...colors];
          locks = [false,false,false,false,false];
          renderPalette();
          updateUrl();
          window.scrollTo({ top: 0, behavior: 'smooth' });
          toast.info('Palette loaded');
        };
        
        // Рендер цветов
        colors.forEach(c => {
          const div = document.createElement('div');
          div.style.backgroundColor = c;
          itemEl.appendChild(div);
        });
        
        // Кнопка удаления
        const delBtn = document.createElement('button');
        delBtn.innerHTML = '×';
        delBtn.style.cssText = `
          position:absolute;top:4px;right:4px;
          width:20px;height:20px;border-radius:50%;
          background:rgba(239,68,68,0.9);color:white;
          border:none;font-size:14px;cursor:pointer;
          display:flex;align-items:center;justify-content:center;
          opacity:0;transition:opacity 0.2s;z-index:1;
        `;
        delBtn.onmouseenter = () => delBtn.style.opacity = '1';
        delBtn.onmouseleave = () => delBtn.style.opacity = '0';
        delBtn.onclick = (e) => {
          e.stopPropagation();
          let saved = JSON.parse(localStorage.getItem('seraviel_palettes') || '[]');
          saved.splice(idx, 1);
          localStorage.setItem('seraviel_palettes', JSON.stringify(saved));
          renderSaved();
          toast.warning('Palette deleted');
        };
        
        wrapper.appendChild(itemEl);
        wrapper.appendChild(delBtn);
        grid.appendChild(wrapper);
      });
    }

    // === URL Sharing ===
    function updateUrl() {
      const colors = palette.join('-').replace(/#/g, '');
      const url = `${location.pathname}?colors=${colors}`;
      history.replaceState(null, '', url);
    }

    function parseUrlColors() {
      const params = new URLSearchParams(location.search);
      const colorsStr = params.get('colors');
      if (!colorsStr) return null;
      
      const colors = colorsStr.split('-').map(c => '#' + c.toUpperCase());
      return colors.every(c => /^#[0-9A-F]{6}$/i.test(c)) ? colors : null;
    }

    // === Keyboard Shortcuts ===
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
        generate();
      }
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        savePalette();
      }
      if (e.ctrlKey && e.key === 'e') {
        e.preventDefault();
        exportCSS();
      }
    });
  </script>
</body>
</html>
