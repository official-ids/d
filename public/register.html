<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация · MyBrowser</title>
  <style>
    :root { --bg-primary:#0e141c; --bg-secondary:rgba(18,28,38,0.95); --text-primary:#e1ecf5; --text-secondary:#90a7bf; --accent:#6a9ec0; --border:rgba(110,150,190,0.2); --success:#6bc48d; --danger:#f87171; }
    [data-theme="light"] { --bg-primary:#f8fafc; --bg-secondary:rgba(255,255,255,0.95); --text-primary:#1e293b; --text-secondary:#64748b; --accent:#3b82f6; --border:rgba(100,120,150,0.2); --success:#16a34a; --danger:#dc2626; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:400px;width:100%}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    .logo svg{stroke:var(--accent)}
    .logo-text{font-weight:600;font-size:1.2rem}
    .logo-sub{color:var(--text-secondary);font-size:0.9rem}
    h1{font-size:1.3rem;margin-bottom:4px}
    .subtitle{color:var(--text-secondary);margin-bottom:24px}
    .form-group{margin-bottom:16px}
    label{display:block;margin-bottom:6px;font-size:0.9rem;color:var(--text-secondary)}
    .input-icon{position:relative}
    .input-icon svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--text-secondary);pointer-events:none}
    .input-icon input{padding-left:42px;width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(8,16,24,0.6);color:var(--text-primary);font-size:1rem;outline:none;transition:border-color 0.2s}
    .input-icon input:focus{border-color:var(--accent)}
    .btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:500;font-size:1rem;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn:hover{background:var(--accent-hover)}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .error,.success{padding:10px 14px;border-radius:8px;font-size:0.9rem;margin-bottom:16px;display:none;text-align:center}
    .error{background:rgba(248,113,113,0.1);color:var(--danger)}
    .success{background:rgba(107,196,141,0.1);color:var(--success)}
    .error.show,.success.show{display:block}
    .footer{text-align:center;margin-top:24px;color:var(--text-secondary);font-size:0.9rem}
    .footer a{color:var(--accent);text-decoration:none}
    .theme-toggle{position:absolute;top:20px;right:20px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);transition:all 0.2s}
    .theme-toggle:hover{color:var(--accent);border-color:var(--accent)}
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">
    <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
    </svg>
  </button>

  <div class="card">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="9"/><line x1="3" y1="12" x2="21" y2="12"/><path d="M12 3a15 15 0 0 1 0 18 15 15 0 0 1 0-18z"/>
      </svg>
      <div><div class="logo-text">MyBrowser</div><div class="logo-sub">Единый аккаунт</div></div>
    </div>
    
    <h1>Регистрация</h1>
    <p class="subtitle">Создайте аккаунт для доступа ко всем продуктам</p>
    
    <div class="error" id="errorEl"></div>
    <div class="success" id="successEl"></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6" autocomplete="new-password">
        </div>
      </div>
      
      <div class="form-group">
        <label for="confirm">Повторите пароль</label>
        <div class="input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="confirm" placeholder="Повторите пароль" required minlength="6" autocomplete="new-password">
        </div>
      </div>
      
      <button type="submit" class="btn" id="submitBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
        Создать аккаунт
      </button>
    </form>
    
    <div class="footer">
      Уже есть аккаунт? <a href="/login">Войти</a> · <a href="/">На главную</a>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('mybrowser_theme', next);
      const icon = document.getElementById('themeIcon');
      if (next === 'dark') {
        icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
      } else {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      }
    }
    (function() {
      const saved = localStorage.getItem('mybrowser_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      if (saved === 'light') {
        document.getElementById('themeIcon').innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      }
    })();

    const form = document.getElementById('registerForm');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');
    const errorEl = document.getElementById('errorEl');
    const successEl = document.getElementById('successEl');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = emailInput.value.trim();
  const password = passInput.value;
  const confirm = confirmInput.value;
  
  if (password !== confirm) { errorEl.textContent = 'Пароли не совпадают'; errorEl.classList.add('show'); return; }
  if (password.length < 6) { errorEl.textContent = 'Пароль должен содержать минимум 6 символов'; errorEl.classList.add('show'); return; }
  
  errorEl.classList.remove('show');
  successEl.classList.remove('show');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/></svg> Создание...';
  
  try {
    const result = await window.supabaseAuth.signUp(email, password);
    
    // 🔥 Обработка ошибок
    if (result.error || result.message?.includes('error')) {
      errorEl.textContent = result.error?.message || result.message || 'Ошибка регистрации';
      errorEl.classList.add('show');
      
    // 🔥 УСПЕХ: есть токен → авто-вход + редирект
    } else if (result.access_token) {
      window.supabaseAuth.saveSession(result);
      successEl.textContent = 'Аккаунт создан. Вход выполнен. Перенаправление...';
      successEl.classList.add('show');
      
      // 🔥 Читаем ?return= из URL
      const urlParams = new URLSearchParams(window.location.search);
      const returnUrl = urlParams.get('return') || '/';
      
      // 🔥 Защита от внешних редиректов
      const safeReturn = returnUrl.startsWith('/') && !returnUrl.startsWith('//') 
        ? returnUrl 
        : '/';
      
      // 🔥 Авто-редирект через 1.5 сек
      setTimeout(() => { window.location.href = safeReturn; }, 1500);
      
    // 🔥 Если нужно подтверждение почты (редкий случай)
    } else if (result.weak_password) {
      errorEl.textContent = 'Пароль слишком слабый';
      errorEl.classList.add('show');
    } else {
      // Supabase просит подтвердить email → всё равно пробуем войти автоматически
      successEl.textContent = 'Проверьте почту. Пробуем войти автоматически...';
      successEl.classList.add('show');
      
      // 🔥 Пробуем войти сразу с теми же данными
      try {
        const loginResult = await window.supabaseAuth.signIn(email, password);
        if (loginResult.access_token) {
          window.supabaseAuth.saveSession(loginResult);
          const urlParams = new URLSearchParams(window.location.search);
          const returnUrl = urlParams.get('return') || '/';
          const safeReturn = returnUrl.startsWith('/') && !returnUrl.startsWith('//') ? returnUrl : '/';
          setTimeout(() => { window.location.href = safeReturn; }, 2000);
        } else {
          setTimeout(() => { window.location.href = '/login'; }, 3000);
        }
      } catch {
        setTimeout(() => { window.location.href = '/login'; }, 3000);
      }
    }
  } catch (err) {
    errorEl.textContent = 'Ошибка сети: ' + err.message;
    errorEl.classList.add('show');
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg> Создать аккаунт';
  }
});
  </script>
</body>
</html>
