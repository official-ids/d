<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFocus · Трекер продуктивности</title>
  <style>
    :root {
      --bg-primary: #0e141c; --bg-secondary: rgba(18, 28, 38, 0.95);
      --text-primary: #e1ecf5; --text-secondary: #90a7bf;
      --accent: #6a9ec0; --accent-hover: #7da7c5;
      --border: rgba(110, 150, 190, 0.2); --success: #6bc48d; --danger: #f87171;
      --warning: #e6b87c; --timer-bg: #1a2a3a; --timer-ring: #2a4a6a;
    }
    [data-theme="light"] {
      --bg-primary: #f8fafc; --bg-secondary: rgba(255, 255, 255, 0.95);
      --text-primary: #1e293b; --text-secondary: #64748b;
      --accent: #3b82f6; --accent-hover: #60a5fa;
      --border: rgba(100, 120, 150, 0.2); --success: #16a34a; --danger: #dc2626;
      --warning: #d97706; --timer-bg: #eef2f6; --timer-ring: #cbd5e1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; margin-bottom: 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 1.3rem; }
    .logo svg { stroke: var(--accent); }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn { padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-primary); font-size: 0.95rem; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { border-color: var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .timer-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 32px; text-align: center; margin-bottom: 24px; }
    .timer-mode { display: inline-flex; gap: 4px; background: var(--timer-bg); padding: 4px; border-radius: 12px; margin-bottom: 24px; }
    .mode-btn { padding: 8px 16px; border-radius: 10px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .mode-btn.active { background: var(--accent); color: #fff; }
    .timer-display { font-size: 4.5rem; font-weight: 700; font-variant-numeric: tabular-nums; margin: 20px 0; letter-spacing: -2px; }
    .timer-ring { width: 220px; height: 220px; border-radius: 50%; background: conic-gradient(var(--accent) 0%, var(--timer-ring) 0%); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; position: relative; transition: background 0.3s; }
    .timer-ring::before { content: ''; position: absolute; inset: 8px; border-radius: 50%; background: var(--timer-bg); }
    .timer-ring > * { position: relative; z-index: 1; }
    .timer-controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; }
    .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }
    .upgrade-banner { background: linear-gradient(135deg, rgba(106,158,192,0.15), rgba(106,158,192,0.05)); border: 1px solid rgba(106,158,192,0.3); border-radius: 16px; padding: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 32px; }
    .upgrade-text { flex: 1; min-width: 200px; }
    .upgrade-text h3 { margin-bottom: 4px; }
    .upgrade-text p { color: var(--text-secondary); font-size: 0.9rem; }
    .sessions-list { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .sessions-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .session-item { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
    .session-item:last-child { border-bottom: none; }
    .session-mode { padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; background: rgba(106,158,192,0.15); color: var(--accent); }
    .session-mode.break { background: rgba(107,196,141,0.15); color: var(--success); }
    .session-date { color: var(--text-secondary); font-size: 0.85rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(6,12,18,0.8); backdrop-filter: blur(8px); z-index: 3000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 28px; max-width: 400px; width: 95%; text-align: center; }
    .modal-card h3 { margin-bottom: 8px; }
    .modal-card p { color: var(--text-secondary); margin-bottom: 20px; font-size: 0.95rem; }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    .timer-running .timer-display { animation: pulse 2s ease-in-out infinite; }
    @media (max-width: 600px) { .timer-display { font-size: 3.5rem; } .timer-ring { width: 180px; height: 180px; } .header { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/>
        </svg>
        <span>MyFocus</span>
      </div>
      <div class="header-actions">
        <button class="btn" id="themeToggle" title="Сменить тему">
          <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
        <!-- 🔧 ИСПРАВЛЕННАЯ КНОПКА ВХОДА -->
        <button class="btn" id="authBtn" onclick="openAuthModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/>
          </svg>
          <span id="authBtnText">Войти</span>
        </button>
      </div>
    </header>

    <div class="upgrade-banner" id="upgradeBanner">
      <div class="upgrade-text">
        <h3>🔓 Демо-режим</h3>
        <p>Данные сохраняются только в этом браузере. <strong>Войдите</strong>, чтобы синхронизировать прогресс между устройствами.</p>
      </div>
      <button class="btn btn-primary" onclick="openAuthModal()">Войти для синхронизации</button>
    </div>

    <div class="timer-card">
      <div class="timer-mode">
        <button class="mode-btn active" data-mode="focus">Фокус</button>
        <button class="mode-btn" data-mode="break">Перерыв</button>
      </div>
      <div class="timer-ring" id="timerRing">
        <div class="timer-display" id="timerDisplay">25:00</div>
      </div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="startBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Старт
        </button>
        <button class="btn" id="pauseBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
          Пауза
        </button>
        <button class="btn" id="resetBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Сброс
        </button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="statToday">0</div><div class="stat-label">Сессии сегодня</div></div>
      <div class="stat-card"><div class="stat-value" id="statMinutes">0</div><div class="stat-label">Минут фокуса</div></div>
      <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Всего сессий</div></div>
      <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div class="stat-label">Серия дней</div></div>
    </div>

    <div class="sessions-list">
      <div class="sessions-header">
        <strong>Последние сессии</strong>
        <button class="btn" id="exportBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Экспорт
        </button>
      </div>
      <div id="sessionsList">
        <div class="session-item" style="justify-content:center;color:var(--text-secondary);">Нет сохранённых сессий</div>
      </div>
    </div>
  </div>

  <!-- Модальное окно (заглушка, реальное загружается динамически) -->
  <div class="modal-overlay" id="authModal">
    <div class="modal-card">
      <h3>🔐 Загрузка...</h3>
      <p>Пожалуйста, подождите</p>
    </div>
  </div>

  <!-- 🔧 КОНТЕЙНЕР ДЛЯ ДИНАМИЧЕСКОЙ ЗАГРУЗКИ -->
  <div id="auth-placeholder"></div>

  <!-- Подключение auth.js -->
  <script src="/auth.js"></script>
  
  <!-- 🔧 СКРИПТ ЗАГРУЗКИ МОДАЛЬНОГО ОКНА -->
  <script>
    // Глобальные функции для управления модальным окном
    window.openAuthModal = function() {
      localStorage.setItem('auth_return_url', window.location.pathname);
      const modal = document.getElementById('authModal');
      if (modal) {
        modal.style.display = 'flex';
        const emailInput = document.getElementById('authEmail');
        if (emailInput) setTimeout(() => emailInput.focus(), 100);
      }
    };
    window.closeAuthModal = function() {
      const modal = document.getElementById('authModal');
      if (modal) modal.style.display = 'none';
    };
    
    // Динамическая загрузка auth-modal.html
    fetch('/components/auth-modal.html')
      .then(r => r.text())
      .then(html => { 
        document.getElementById('auth-placeholder').innerHTML = html;
        if (window.updateAuthUI) window.updateAuthUI();
      })
      .catch(err => console.warn('Не удалось загрузить auth-modal:', err));
  </script>
  
  <!-- Оригинальный скрипт focus.html (без изменений) -->
  <script>
    const CONFIG = { focusTime: 25 * 60, breakTime: 5 * 60, storageKey: 'myfocus_demo', syncInterval: 30000 };
    const state = { mode: 'focus', timeLeft: CONFIG.focusTime, isRunning: false, timerId: null, startTime: null, sessions: [], isAuthenticated: false, userId: null };
    const els = { timerDisplay: document.getElementById('timerDisplay'), timerRing: document.getElementById('timerRing'), startBtn: document.getElementById('startBtn'), pauseBtn: document.getElementById('pauseBtn'), resetBtn: document.getElementById('resetBtn'), modeBtns: document.querySelectorAll('.mode-btn'), statToday: document.getElementById('statToday'), statMinutes: document.getElementById('statMinutes'), statTotal: document.getElementById('statTotal'), statStreak: document.getElementById('statStreak'), sessionsList: document.getElementById('sessionsList'), upgradeBanner: document.getElementById('upgradeBanner'), exportBtn: document.getElementById('exportBtn'), authBtn: document.getElementById('authBtn'), authBtnText: document.getElementById('authBtnText'), authModal: document.getElementById('authModal'), themeToggle: document.getElementById('themeToggle'), themeIcon: document.getElementById('themeIcon') };

    async function init() { loadTheme(); await checkAuth(); loadData(); updateTimerDisplay(); updateStats(); renderSessions(); updateAuthUI(); setupEventListeners(); if (state.isAuthenticated) { setInterval(syncToCloud, CONFIG.syncInterval); } }
    async function checkAuth() { if (window.supabaseAuth && await window.supabaseAuth.isAuthenticated()) { state.isAuthenticated = true; const user = await window.supabaseAuth.getUser(); state.userId = user?.id; els.upgradeBanner.style.display = 'none'; els.exportBtn.disabled = false; await loadFromCloud(); } }
    function updateAuthUI() { if (state.isAuthenticated) { els.authBtnText.textContent = 'Выйти'; els.authBtn.onclick = async (e) => { e.preventDefault(); if (confirm('Выйти из аккаунта?')) { await window.supabaseAuth.signOut(); state.isAuthenticated = false; state.userId = null; els.upgradeBanner.style.display = 'flex'; els.exportBtn.disabled = true; updateAuthUI(); location.reload(); } }; } else { els.authBtnText.textContent = 'Войти'; els.authBtn.onclick = openAuthModal; } }
    function updateTimerDisplay() { const mins = Math.floor(state.timeLeft / 60), secs = state.timeLeft % 60; els.timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`; const total = state.mode === 'focus' ? CONFIG.focusTime : CONFIG.breakTime, progress = 1 - (state.timeLeft / total); els.timerRing.style.background = `conic-gradient(var(--accent) ${progress * 100}%, var(--timer-ring) ${progress * 100}%)`; document.title = `${mins}:${secs.toString().padStart(2, '0')} · MyFocus`; }
    function startTimer() { if (state.isRunning) return; state.isRunning = true; state.startTime = Date.now(); els.startBtn.disabled = true; els.pauseBtn.disabled = false; document.querySelector('.timer-card').classList.add('timer-running'); state.timerId = setInterval(() => { state.timeLeft--; updateTimerDisplay(); if (state.timeLeft <= 0) { completeSession(); } }, 1000); playBeep(440, 0.05); }
    function pauseTimer() { if (!state.isRunning) return; clearInterval(state.timerId); state.isRunning = false; els.startBtn.disabled = false; els.pauseBtn.disabled = true; document.querySelector('.timer-card').classList.remove('timer-running'); }
    function resetTimer() { pauseTimer(); state.timeLeft = state.mode === 'focus' ? CONFIG.focusTime : CONFIG.breakTime; updateTimerDisplay(); }
    function switchMode(mode) { pauseTimer(); state.mode = mode; state.timeLeft = mode === 'focus' ? CONFIG.focusTime : CONFIG.breakTime; els.modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode)); updateTimerDisplay(); }
    function completeSession() { pauseTimer(); playBeep(state.mode === 'focus' ? 880 : 660, 0.3); if (state.isAuthenticated && Notification.permission === 'granted') { new Notification(state.mode === 'focus' ? '✅ Фокус завершён!' : '☕ Перерыв окончен', { body: state.mode === 'focus' ? 'Отличная работа! Время отдохнуть.' : 'Возвращайтесь к работе!' }); } const session = { id: Date.now(), mode: state.mode, duration: state.mode === 'focus' ? CONFIG.focusTime : CONFIG.breakTime, completedAt: new Date().toISOString(), userId: state.userId }; state.sessions.unshift(session); saveData(); if (state.isAuthenticated) { saveToCloud(session); } updateStats(); renderSessions(); setTimeout(() => { switchMode(state.mode === 'focus' ? 'break' : 'focus'); }, 2000); }
    function playBeep(freq, duration) { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(), osc = ctx.createOscillator(), gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = freq; gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration); osc.start(); osc.stop(ctx.currentTime + duration); } catch (e) {} }
    function loadData() { try { const saved = JSON.parse(localStorage.getItem(CONFIG.storageKey)); if (saved?.sessions) { state.sessions = saved.sessions; } } catch (e) { console.warn('Ошибка загрузки данных:', e); } }
    function saveData() { try { localStorage.setItem(CONFIG.storageKey, JSON.stringify({ sessions: state.sessions, lastSync: Date.now() })); } catch (e) { console.warn('Ошибка сохранения данных:', e); } }
    async function loadFromCloud() { if (!state.isAuthenticated || !state.userId) return; try { const session = window.supabaseAuth.getSession(); const res = await fetch(`https://qhmecfhqmdeouohrtplb.supabase.co/rest/v1/focus_sessions?user_id=eq.${state.userId}&order=completed_at.desc&limit=50`, { headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFobWVjZmhxbWRlb3VvaHJ0cGxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTcxMTAsImV4cCI6MjA5MjQzMzExMH0.nP3ZMLP31p_GuVsuAwHf2tZkLzww8gLQnwguKsAa53k', 'Authorization': `Bearer ${session?.access_token}`, 'Prefer': 'return=minimal' } }); if (res.ok) { const cloudSessions = await res.json(); const localIds = new Set(state.sessions.map(s => s.id)); state.sessions = [...cloudSessions.filter(s => !localIds.has(s.id)), ...state.sessions].slice(0, 100); saveData(); updateStats(); renderSessions(); } } catch (e) { console.warn('Ошибка синхронизации:', e); } }
    async function saveToCloud(session) { if (!state.isAuthenticated || !state.userId) return; try { const sessionAuth = window.supabaseAuth.getSession(); await fetch('https://qhmecfhqmdeouohrtplb.supabase.co/rest/v1/focus_sessions', { method: 'POST', headers: { 'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFobWVjZmhxbWRlb3VvaHJ0cGxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTcxMTAsImV4cCI6MjA5MjQzMzExMH0.nP3ZMLP31p_GuVsuAwHf2tZkLzww8gLQnwguKsAa53k', 'Authorization': `Bearer ${sessionAuth?.access_token}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' }, body: JSON.stringify(session) }); } catch (e) { console.warn('Ошибка сохранения в облако:', e); } }
    async function syncToCloud() { if (!state.isAuthenticated) return; await loadFromCloud(); }
    function updateStats() { const now = new Date(), today = now.toISOString().split('T')[0], todaySessions = state.sessions.filter(s => s.completedAt.startsWith(today) && s.mode === 'focus'), totalMinutes = state.sessions.filter(s => s.mode === 'focus').reduce((sum, s) => sum + Math.round(s.duration / 60), 0); let streak = 0; const dates = [...new Set(state.sessions.filter(s => s.mode === 'focus').map(s => s.completedAt.split('T')[0]).sort().reverse())]; for (let i = 0; i < dates.length; i++) { const expected = new Date(); expected.setDate(expected.getDate() - i); const expectedDate = expected.toISOString().split('T')[0]; if (dates[i] === expectedDate) { streak++; } else { break; } } els.statToday.textContent = todaySessions.length; els.statMinutes.textContent = totalMinutes; els.statTotal.textContent = state.sessions.filter(s => s.mode === 'focus').length; els.statStreak.textContent = streak; }
    function renderSessions() { if (state.sessions.length === 0) { els.sessionsList.innerHTML = '<div class="session-item" style="justify-content:center;color:var(--text-secondary);">Нет сохранённых сессий</div>'; return; } els.sessionsList.innerHTML = state.sessions.slice(0, 10).map(s => { const date = new Date(s.completedAt), timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }), dateStr = date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' }), mins = Math.round(s.duration / 60); return `<div class="session-item"><div><strong>${mins} мин</strong><span class="session-mode ${s.mode === 'break' ? 'break' : ''}">${s.mode === 'focus' ? 'Фокус' : 'Перерыв'}</span></div><span class="session-date">${timeStr} · ${dateStr}</span></div>`; }).join(''); }
    function exportData() { if (!state.isAuthenticated) return; const data = { exportedAt: new Date().toISOString(), userId: state.userId, sessions: state.sessions }, blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }), url = URL.createObjectURL(blob), a = document.createElement('a'); a.href = url; a.download = `myfocus-export-${Date.now()}.json`; a.click(); URL.revokeObjectURL(url); }
    function loadTheme() { const saved = localStorage.getItem('mybrowser_theme') || 'dark'; document.documentElement.setAttribute('data-theme', saved); updateThemeIcon(saved); }
    function toggleTheme() { const html = document.documentElement, current = html.getAttribute('data-theme'), next = current === 'dark' ? 'light' : 'dark'; html.setAttribute('data-theme', next); localStorage.setItem('mybrowser_theme', next); updateThemeIcon(next); }
    function updateThemeIcon(theme) { if (theme === 'dark') { els.themeIcon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>'; } else { els.themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'; } }
    function setupEventListeners() { els.startBtn.onclick = startTimer; els.pauseBtn.onclick = pauseTimer; els.resetBtn.onclick = resetTimer; els.modeBtns.forEach(btn => { btn.onclick = () => switchMode(btn.dataset.mode); }); els.exportBtn.onclick = exportData; els.themeToggle.onclick = toggleTheme; document.addEventListener('click', () => { if (state.isAuthenticated && Notification.permission === 'default') { Notification.requestPermission(); } }, { once: true }); }
    init();
  </script>
</body>
</html>
