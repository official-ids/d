<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Client · Broadcast</title>
  <style>
    :root {
      --bg: #0b1118; --surface: #111b27; --surface-hover: #16202d;
      --border: #1e2d3d; --text: #e2e8f0; --text-muted: #64748b;
      --primary: #ef4444; --primary-hover: #dc2626;
      --success: #10b981; --warning: #f59e0b; --error: #ef4444;
      --radius: 10px; --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --surface: #ffffff; --surface-hover: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
      --primary: #dc2626; --primary-hover: #b91c1c;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 20px; line-height: 1.5;
    }
    .app { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1.2rem; }
    .brand svg { stroke: var(--primary); }
    .nav {
      display: flex; gap: 4px; background: var(--surface); padding: 4px;
      border-radius: 12px; border: 1px solid var(--border);
    }
    .nav-btn {
      background: transparent; border: none; color: var(--text-muted);
      padding: 8px 14px; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { color: var(--text); background: var(--surface-hover); }
    .nav-btn.active { background: var(--primary); color: #fff; }
    .actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--primary); }
    .tab { display: none; animation: fadeUp 0.25s ease; }
    .tab.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .input, .textarea, .select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 12px; border-radius: var(--radius);
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
      font-family: var(--font);
    }
    .input:focus, .textarea:focus, .select:focus { border-color: var(--primary); }
    .textarea { min-height: 100px; resize: vertical; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
    .btn {
      padding: 12px 18px; border-radius: var(--radius); border: none;
      background: var(--primary); color: #fff; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface-hover); }
    .status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; padding: 6px 12px; border-radius: 20px;
      background: var(--bg); border: 1px solid var(--border);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .dot.error { background: var(--error); }
    .bot-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; margin-top: 20px;
    }
    .bot-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .bot-card:hover {
      background: var(--surface-hover); border-color: var(--primary);
      transform: translateY(-2px); box-shadow: var(--shadow);
    }
    .bot-card.active { border-color: var(--primary); background: var(--surface-hover); }
    .bot-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .bot-avatar {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--primary); display: flex;
      align-items: center; justify-content: center;
      font-weight: 600; color: #fff;
    }
    .bot-info h3 { font-size: 1rem; font-weight: 600; }
    .bot-info p { font-size: 0.8rem; color: var(--text-muted); }
    .bot-stats {
      display: flex; gap: 16px; margin-top: 12px;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .stat { display: flex; flex-direction: column; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); }
    .bot-actions { margin-top: 12px; display: flex; gap: 8px; }
    .button-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .button-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .button-item input { flex: 1; min-width: 120px; }
    .color-picker {
      width: 50px; height: 40px; border: none;
      border-radius: 8px; cursor: pointer; background: transparent;
    }
    .remove-btn {
      width: 36px; height: 36px; border: none;
      background: rgba(239, 68, 68, 0.15); color: var(--error);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .remove-btn:hover { background: rgba(239, 68, 68, 0.25); }
    .message-preview {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-top: 20px; max-width: 400px;
    }
    .preview-text { font-size: 0.95rem; margin-bottom: 12px; white-space: pre-wrap; }
    .preview-buttons { display: flex; flex-direction: column; gap: 8px; }
    .preview-btn {
      padding: 10px 14px; border-radius: 8px; text-align: center;
      font-weight: 500; color: #fff; background: var(--primary);
    }
    .feed {
      max-height: 500px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .feed-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 10px; transition: background 0.2s;
    }
    .feed-item:hover { background: var(--surface-hover); }
    .feed-meta {
      font-size: 0.75rem; color: var(--text-muted);
      margin-bottom: 4px; display: flex; gap: 8px; align-items: center;
    }
    .feed-content { font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
    .copy-btn { opacity: 0; transition: opacity 0.2s; cursor: pointer; color: var(--text-muted); }
    .feed-item:hover .copy-btn { opacity: 1; }
    .chat-list {
      max-height: 300px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; font-size: 0.9rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chat-count {
      background: var(--primary); color: #fff;
      padding: 4px 10px; border-radius: 12px; font-size: 0.8rem;
    }
    .toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 10px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.3s ease; min-width: 250px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .empty {
      text-align: center; color: var(--text-muted); padding: 40px 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .empty svg { opacity: 0.4; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: stretch; }
      .nav { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>
        <span>Bot Client</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-tab="bots">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Боты
        </button>
        <button class="nav-btn" data-tab="compose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Рассылка
        </button>
        <button class="nav-btn" data-tab="chats">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Чаты (<span id="chatCount">0</span>)
        </button>
        <button class="nav-btn" data-tab="feed">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          История
        </button>
      </nav>
      <div class="actions">
        <button class="icon-btn" id="themeToggle" title="Тема">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>
    </header>

    <section id="bots" class="tab active">
      <div class="card">
        <div class="input-group">
          <label class="label">Токен бота</label>
          <div class="row" style="align-items: flex-end;">
            <input type="text" id="tokenInput" class="input" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11">
            <button class="btn" id="connectBtn" style="white-space: nowrap;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
              Подключить
            </button>
          </div>
        </div>
        <div id="botListContainer"></div>
      </div>
    </section>

    <section id="compose" class="tab">
      <div class="card">
        <div class="input-group">
          <label class="label">Бот для рассылки</label>
          <select id="botSelect" class="select">
            <option value="">-- Выберите бота --</option>
          </select>
        </div>
        <div class="input-group">
          <label class="label">Текст сообщения</label>
          <textarea id="messageText" class="textarea" placeholder="Введите текст для рассылки всем чатам..."></textarea>
        </div>
        <div style="margin-bottom: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="label">Кнопки (только красные)</span>
            <button class="btn btn-outline" id="addButtonBtn" style="padding: 6px 12px; font-size: 0.85rem;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Добавить
            </button>
          </div>
          <div id="buttonList" class="button-list"></div>
        </div>
        <div class="message-preview" id="messagePreview">
          <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">Предпросмотр</div>
          <div class="preview-text" id="previewText">Текст сообщения...</div>
          <div class="preview-buttons" id="previewButtons"></div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button class="btn" id="broadcastBtn" style="flex:1;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 12L2.1 12.05"/></svg>
            Отправить всем (<span id="targetChats">0</span> чатов)
          </button>
        </div>
      </div>
    </section>

    <section id="chats" class="tab">
      <div class="card">
        <h3 style="margin-bottom:16px;">Чаты бота</h3>
        <div id="chatList" class="chat-list">
          <div class="empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Чаты будут появляться здесь автоматически</span>
          </div>
        </div>
      </div>
    </section>

    <section id="feed" class="tab">
      <div class="card">
        <h3 style="margin-bottom:16px;">История сообщений</h3>
        <div id="messageFeed" class="feed">
          <div class="empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>История пуста</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    (function() {
      const DB = { BOTS: 'bc_bots', MSGS: 'bc_messages', CHATS: 'bc_chats', DRAFT: 'bc_draft', THEME: 'theme' };
      let state = { bots: [], messages: [], chats: [], buttons: [], currentBot: null, cooldown: false };
      const $ = (sel) => document.querySelector(sel);
      const $$ = (sel) => document.querySelectorAll(sel);

      const toast = (msg, type = 'info') => {
        const container = $('#toastContainer');
        const t = document.createElement('div');
        t.className = 'toast';
        const color = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--error)' : 'var(--primary)';
        t.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${color}"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><span>${msg}</span>`;
        container.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(100%)'; setTimeout(() => t.remove(), 300); }, 3000);
      };

      const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { toast('Хранилище переполнено', 'error'); } };
      const load = (key) => { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } };

      function switchTab(tabName) {
        $$('.nav-btn').forEach(b => b.classList.remove('active'));
        $$('.tab').forEach(t => t.classList.remove('active'));
        $(`[data-tab="${tabName}"]`).classList.add('active');
        $(`#${tabName}`).classList.add('active');
        if (tabName === 'bots') renderBotList();
        if (tabName === 'compose') { updateBotSelect(); updateTargetChats(); }
        if (tabName === 'chats') renderChatList();
        if (tabName === 'feed') renderFeed();
      }

      $$('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });

      async function connectBot() {
        const token = $('#tokenInput').value.trim();
        if (!token) { toast('Введите токен бота', 'error'); return; }
        try {
          const res = await fetch(`https://api.telegram.org/bot${token}/getMe`);
          const data = await res.json();
          if (data.ok) {
            const bot = {
              id: data.result.id, username: data.result.username, first_name: data.result.first_name,
              token: token, connected: new Date().toISOString(), stats: { messages: 0, users: 0 }
            };
            state.bots.push(bot);
            save(DB.BOTS, state.bots);
            $('#tokenInput').value = '';
            renderBotList();
            toast(`Бот @${bot.username} подключен`, 'success');
          } else {
            toast('Ошибка: неверный токен', 'error');
          }
        } catch (e) {
          toast('Ошибка сети', 'error');
        }
      }

      function renderBotList() {
        const container = $('#botListContainer');
        if (state.bots.length === 0) {
          container.innerHTML = `<div class="empty" style="margin-top:20px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>
            <span>Нет подключенных ботов</span>
          </div>`;
          return;
        }
        container.innerHTML = `<div class="bot-grid">${state.bots.map((bot, idx) => `
          <div class="bot-card ${state.currentBot === idx ? 'active' : ''}" onclick="window.selectBot(${idx})">
            <div class="bot-header">
              <div class="bot-avatar">${bot.first_name[0].toUpperCase()}</div>
              <div class="bot-info">
                <h3>@${bot.username}</h3>
                <p>${bot.first_name}</p>
              </div>
            </div>
            <div class="bot-stats">
              <div class="stat"><span class="stat-value">${bot.stats.messages}</span><span class="stat-label">Сообщений</span></div>
              <div class="stat"><span class="stat-value">${state.chats.length}</span><span class="stat-label">Чатов</span></div>
            </div>
            <div class="bot-actions">
              <button class="btn btn-outline" style="flex:1; padding:6px 10px; font-size:0.85rem;" onclick="event.stopPropagation(); window.viewStats(${idx})">Статистика</button>
              <button class="btn btn-outline" style="padding:6px 10px; color:var(--error);" onclick="event.stopPropagation(); window.removeBot(${idx})">✕</button>
            </div>
          </div>
        `).join('')}</div>`;
      }

      window.selectBot = (idx) => { state.currentBot = idx; renderBotList(); };
      window.removeBot = (idx) => {
        if (confirm('Удалить этого бота?')) {
          state.bots.splice(idx, 1);
          save(DB.BOTS, state.bots);
          if (state.currentBot === idx) state.currentBot = null;
          renderBotList();
          toast('Бот удален');
        }
      };
      window.viewStats = (idx) => {
        const bot = state.bots[idx];
        toast(`@${bot.username}: ${bot.stats.messages} сообщ., ${state.chats.length} чатов`);
      };

      function updateBotSelect() {
        const select = $('#botSelect');
        select.innerHTML = '<option value="">-- Выберите бота --</option>' +
          state.bots.map((b, i) => `<option value="${i}">@${b.username}</option>`).join('');
      }

      function updateTargetChats() {
        $('#targetChats').textContent = state.chats.length;
      }

      function renderChatList() {
        const list = $('#chatList');
        $('#chatCount').textContent = state.chats.length;
        if (state.chats.length === 0) {
          list.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Чаты появятся автоматически когда бот получит сообщения</span></div>`;
          return;
        }
        list.innerHTML = state.chats.map((chat, i) => `
          <div class="chat-item">
            <span>${chat.title || chat.username || `Chat ${chat.id}`}</span>
            <span style="font-size:0.8rem; color:var(--text-muted);">${chat.type}</span>
          </div>
        `).join('');
      }

      window.addButton = () => {
        const id = Date.now();
        state.buttons.push({ id, text: '', url: '', style: 'danger' });
        renderButtons();
      };

      function renderButtons() {
        const list = $('#buttonList');
        list.innerHTML = state.buttons.map(btn => `
          <div class="button-item" data-id="${btn.id}">
            <input type="text" placeholder="Текст кнопки" class="input" value="${escAttr(btn.text)}" oninput="window.updateButton(${btn.id}, 'text', this.value)">
            <input type="text" placeholder="URL" class="input" value="${escAttr(btn.url)}" oninput="window.updateButton(${btn.id}, 'url', this.value)">
            <span style="font-size:0.8rem; color:var(--error); font-weight:600;">DANGER</span>
            <button class="remove-btn" onclick="window.removeButton(${btn.id})">✕</button>
          </div>
        `).join('');
        updatePreview();
      }

      window.updateButton = (id, field, value) => {
        const btn = state.buttons.find(b => b.id === id);
        if (btn) { btn[field] = value; updatePreview(); }
      };

      window.removeButton = (id) => {
        state.buttons = state.buttons.filter(b => b.id !== id);
        renderButtons();
      };

      function updatePreview() {
        const text = $('#messageText').value || 'Текст сообщения...';
        $('#previewText').textContent = text;
        $('#previewButtons').innerHTML = state.buttons.map(b =>
          `<div class="preview-btn" style="background:var(--primary)">${b.text || 'Кнопка'}</div>`
        ).join('');
      }

      async function broadcastMessage() {
        const botIndex = $('#botSelect').value;
        const text = $('#messageText').value.trim();
        if (!botIndex) { toast('Выберите бота', 'error'); return; }
        if (!text) { toast('Введите текст', 'error'); return; }
        if (state.chats.length === 0) { toast('Нет чатов для рассылки', 'error'); return; }

        const bot = state.bots[botIndex];
        const inlineKeyboard = state.buttons.length > 0 ? {
          inline_keyboard: [state.buttons.map(b => ({ text: b.text, url: b.url, style: 'danger' }))]
        } : undefined;

        let success = 0, failed = 0;
        $('#broadcastBtn').disabled = true;
        $('#broadcastBtn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/></svg> Отправка...';

        for (const chat of state.chats) {
          try {
            const res = await fetch(`https://api.telegram.org/bot${bot.token}/sendMessage`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: chat.id, text, reply_markup: inlineKeyboard })
            });
            const data = await res.json();
            if (data.ok) success++;
            else failed++;
          } catch (e) {
            failed++;
          }
          await new Promise(r => setTimeout(r, 100));
        }

        bot.stats.messages += success;
        save(DB.BOTS, state.bots);
        
        const msg = {
          id: Date.now(), bot: bot.username, text,
          chats: state.chats.length, success, failed,
          buttons: state.buttons, timestamp: new Date().toISOString()
        };
        state.messages.unshift(msg);
        save(DB.MSGS, state.messages);
        
        $('#broadcastBtn').disabled = false;
        $('#broadcastBtn').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 12L2.1 12.05"/></svg> Отправить всем (${state.chats.length} чатов)`;
        
        toast(`Рассылка завершена: ${success} успешно, ${failed} ошибок`, success > 0 ? 'success' : 'error');
        $('#messageText').value = '';
        state.buttons = [];
        renderButtons();
        updatePreview();
      }

      function renderFeed() {
        const feed = $('#messageFeed');
        if (state.messages.length === 0) {
          feed.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>История пуста</span></div>`;
          return;
        }
        feed.innerHTML = state.messages.map(m => `
          <div class="feed-item">
            <div>
              <div class="feed-meta">
                <span>@${m.bot}</span>
                <span>→ ${m.chats} чатов</span>
                <span>✓ ${m.success}</span>
                <span>✗ ${m.failed}</span>
                <span>${new Date(m.timestamp).toLocaleString()}</span>
              </div>
              <div class="feed-content">${escHtml(m.text)}</div>
              ${m.buttons.length ? `<div style="margin-top:8px; display:flex; gap:6px;">${m.buttons.map(b => `<span style="padding:2px 8px; background:var(--primary); color:#fff; border-radius:6px; font-size:0.8rem;">${escHtml(b.text)}</span>`).join('')}</div>` : ''}
            </div>
            <button class="copy-btn" onclick="window.copyMsg('${escAttr(m.text)}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
          </div>
        `).join('');
      }

      window.copyMsg = (text) => {
        navigator.clipboard.writeText(text).then(() => toast('Скопировано'));
      };

      function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

      function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem(DB.THEME, next);
      }

      function init() {
        state.bots = load(DB.BOTS);
        state.messages = load(DB.MSGS);
        state.chats = load(DB.CHATS);
        const draft = localStorage.getItem(DB.DRAFT);
        if (draft) $('#messageText').value = draft;

        $('#connectBtn').addEventListener('click', connectBot);
        $('#addButtonBtn').addEventListener('click', window.addButton);
        $('#broadcastBtn').addEventListener('click', broadcastMessage);
        $('#messageText').addEventListener('input', () => {
          updatePreview();
          localStorage.setItem(DB.DRAFT, $('#messageText').value);
        });
        $('#themeToggle').addEventListener('click', toggleTheme);

        const savedTheme = localStorage.getItem(DB.THEME) || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);

        renderBotList();
        updatePreview();
        updateTargetChats();
      }

      window.addEventListener('DOMContentLoaded', init);
    })();
  </script>
</body>
</html>
