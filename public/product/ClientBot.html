<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Client · Broadcast</title>
  <style>
    :root {
      --bg: #0b1118; --surface: #111b27; --surface-hover: #16202d;
      --border: #1e2d3d; --text: #e2e8f0; --text-muted: #64748b;
      --primary: #ef4444; --primary-hover: #dc2626;
      --success: #10b981; --warning: #f59e0b; --error: #ef4444;
      --radius: 10px; --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --surface: #ffffff; --surface-hover: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
      --primary: #dc2626; --primary-hover: #b91c1c;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 20px; line-height: 1.5;
    }
    .app { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1.2rem; }
    .brand svg { stroke: var(--primary); }
    .nav {
      display: flex; gap: 4px; background: var(--surface); padding: 4px;
      border-radius: 12px; border: 1px solid var(--border);
    }
    .nav-btn {
      background: transparent; border: none; color: var(--text-muted);
      padding: 8px 14px; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { color: var(--text); background: var(--surface-hover); }
    .nav-btn.active { background: var(--primary); color: #fff; }
    .actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--primary); }
    .tab { display: none; animation: fadeUp 0.25s ease; }
    .tab.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .input, .textarea, .select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 12px; border-radius: var(--radius);
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
      font-family: var(--font);
    }
    .input:focus, .textarea:focus, .select:focus { border-color: var(--primary); }
    .textarea { min-height: 100px; resize: vertical; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
    .btn {
      padding: 12px 18px; border-radius: var(--radius); border: none;
      background: var(--primary); color: #fff; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface-hover); }
    .status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; padding: 6px 12px; border-radius: 20px;
      background: var(--bg); border: 1px solid var(--border);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    .dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .dot.error { background: var(--error); }
    .bot-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; margin-top: 20px;
    }
    .bot-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .bot-card:hover {
      background: var(--surface-hover); border-color: var(--primary);
      transform: translateY(-2px); box-shadow: var(--shadow);
    }
    .bot-card.active { border-color: var(--primary); background: var(--surface-hover); }
    .bot-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .bot-avatar {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--primary); display: flex;
      align-items: center; justify-content: center;
      font-weight: 600; color: #fff;
    }
    .bot-info h3 { font-size: 1rem; font-weight: 600; }
    .bot-info p { font-size: 0.8rem; color: var(--text-muted); }
    .bot-stats {
      display: flex; gap: 16px; margin-top: 12px;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .stat { display: flex; flex-direction: column; }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); }
    .bot-actions { margin-top: 12px; display: flex; gap: 8px; }
    .button-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .button-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .button-item input { flex: 1; min-width: 120px; }
    .color-picker {
      width: 50px; height: 40px; border: none;
      border-radius: 8px; cursor: pointer; background: transparent;
    }
    .remove-btn {
      width: 36px; height: 36px; border: none;
      background: rgba(239, 68, 68, 0.15); color: var(--error);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .remove-btn:hover { background: rgba(239, 68, 68, 0.25); }
    .message-preview {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-top: 20px; max-width: 400px;
    }
    .preview-text { font-size: 0.95rem; margin-bottom: 12px; white-space: pre-wrap; }
    .preview-buttons { display: flex; flex-direction: column; gap: 8px; }
    .preview-btn {
      padding: 10px 14px; border-radius: 8px; text-align: center;
      font-weight: 500; color: #fff; background: var(--primary);
    }
    .feed {
      max-height: 500px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .feed-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 10px; transition: background 0.2s;
    }
    .feed-item:hover { background: var(--surface-hover); }
    .feed-meta {
      font-size: 0.75rem; color: var(--text-muted);
      margin-bottom: 4px; display: flex; gap: 8px; align-items: center;
    }
    .feed-content { font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
    .copy-btn { opacity: 0; transition: opacity 0.2s; cursor: pointer; color: var(--text-muted); }
    .feed-item:hover .copy-btn { opacity: 1; }
    .chat-list {
      max-height: 300px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; font-size: 0.9rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chat-count {
      background: var(--primary); color: #fff;
      padding: 4px 10px; border-radius: 12px; font-size: 0.8rem;
    }
    .toast-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 10px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 10px;
      animation: slideIn 0.3s ease; min-width: 250px;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .empty {
      text-align: center; color: var(--text-muted); padding: 40px 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .empty svg { opacity: 0.4; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: stretch; }
      .nav { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>
        <span>Bot Client</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-tab="bots">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Боты
        </button>
        <button class="nav-btn" data-tab="compose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Рассылка
        </button>
        <button class="nav-btn" data-tab="chats">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Чаты (<span id="chatCount">0</span>)
        </button>
        <button class="nav-btn" data-tab="feed">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          История
        </button>
      </nav>
      <div class="actions">
        <button class="icon-btn" id="themeToggle" title="Тема">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>
    </header>

    <section id="bots" class="tab active">
      <div class="card">
        <div class="input-group">
          <label class="label">Токен бота</label>
          <div class="row" style="align-items: flex-end;">
            <input type="text" id="tokenInput" class="input" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11">
            <button class="btn" id="connectBtn" style="white-space: nowrap;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
              Подключить
            </button>
          </div>
        </div>
        <div id="botListContainer"></div>
      </div>
    </section>

    <section id="compose" class="tab">
      <div class="card">
        <div class="input-group">
          <label class="label">Бот для рассылки</label>
          <select id="botSelect" class="select">
            <option value="">-- Выберите бота --</option>
          </select>
        </div>
        <div class="input-group">
          <label class="label">Текст сообщения</label>
          <textarea id="messageText" class="textarea" placeholder="Введите текст для рассылки всем чатам..."></textarea>
        </div>
        <div style="margin-bottom: 16px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="label">Кнопки (только красные)</span>
            <button class="btn btn-outline" id="addButtonBtn" style="padding: 6px 12px; font-size: 0.85rem;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Добавить
            </button>
          </div>
          <div id="buttonList" class="button-list"></div>
        </div>
        <div class="message-preview" id="messagePreview">
          <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:8px;">Предпросмотр</div>
          <div class="preview-text" id="previewText">Текст сообщения...</div>
          <div class="preview-buttons" id="previewButtons"></div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button class="btn" id="broadcastBtn" style="flex:1;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 12L2.1 12.05"/></svg>
            Отправить всем (<span id="targetChats">0</span> чатов)
          </button>
        </div>
      </div>
    </section>

    <section id="chats" class="tab">
      <div class="card">
        <h3 style="margin-bottom:16px;">Чаты бота</h3>
        <div id="chatList" class="chat-list">
          <div class="empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Чаты будут появляться здесь автоматически</span>
          </div>
        </div>
      </div>
    </section>

    <section id="feed" class="tab">
      <div class="card">
        <h3 style="margin-bottom:16px;">История сообщений</h3>
        <div id="messageFeed" class="feed">
          <div class="empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>История пуста</span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast-container" id="toastContainer"></div>

<script>
    // ===== STATE & CONFIG =====
    const STORAGE_KEYS = {
      BOTS: 'bc_bots',
      MSGS: 'bc_messages',
      THEME: 'bc_theme'
    };

    // Безопасная загрузка (не крашится на строках)
    const loadSafe = (key) => {
      try {
        const val = localStorage.getItem(key);
        if (!val) return null;
        return JSON.parse(val);
      } catch {
        return null;
      }
    };

    // Безопасное сохранение
    const saveSafe = (key, data) => {
      try {
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {
        console.error('Save error:', e);
      }
    };

    // Инициализация состояния
    let state = {
      bots: loadSafe(STORAGE_KEYS.BOTS) || [],
      messages: loadSafe(STORAGE_KEYS.MSGS) || [],
      selectedBotIndex: 0
    };

    // DOM Elements
    const els = {
      tokenInput: document.getElementById('tokenInput'),
      connectBtn: document.getElementById('connectBtn'),
      botList: document.getElementById('botList'),
      botSelect: document.getElementById('botSelect'),
      chatIdInput: document.getElementById('chatIdInput'),
      messageText: document.getElementById('messageText'),
      sendBtn: document.getElementById('sendBtn'),
      feed: document.getElementById('feed'),
      themeToggle: document.getElementById('themeToggle')
    };

    // ===== RENDER FUNCTIONS =====

    function renderBots() {
      if (!els.botList) return;
      if (state.bots.length === 0) {
        els.botList.innerHTML = `<div style="padding:10px;color:var(--text-muted)">Нет подключенных ботов</div>`;
        return;
      }
      els.botList.innerHTML = state.bots.map((b, i) => `
        <div class="bot-card ${state.selectedBotIndex === i ? 'active' : ''}" onclick="selectBot(${i})">
          <div class="bot-info"><b>@${b.username}</b></div>
        </div>
      `).join('');
    }

    window.selectBot = (idx) => {
      state.selectedBotIndex = idx;
      renderBots();
      updateBotSelect();
    };

    function updateBotSelect() {
      if (!els.botSelect) return;
      els.botSelect.innerHTML = '<option value="">-- Выбрать бота --</option>';
      state.bots.forEach((b, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.text = `@${b.username}`;
        if (i === state.selectedBotIndex) opt.selected = true;
        els.botSelect.appendChild(opt);
      });
    }

    els.botSelect?.addEventListener('change', (e) => {
      state.selectedBotIndex = parseInt(e.target.value);
      renderBots();
    });

    function renderFeed() {
      if (!els.feed) return;
      if (state.messages.length === 0) {
        els.feed.innerHTML = '<div style="padding:10px;color:var(--text-muted)">История пуста</div>';
        return;
      }
      els.feed.innerHTML = state.messages.slice().reverse().map(m => `
        <div class="feed-item">
          <div class="feed-meta">@${m.bot} → ${m.chatId} <span style="color:var(--text-muted)">${new Date(m.date).toLocaleTimeString()}</span></div>
          <div class="feed-content">${m.text}</div>
        </div>
      `).join('');
    }

    // ===== ACTIONS =====

    // Connect Bot
    els.connectBtn?.addEventListener('click', async () => {
      const token = els.tokenInput.value.trim();
      if (!token) return alert('Введи токен');
      
      els.connectBtn.disabled = true;
      els.connectBtn.textContent = '...';

      try {
        const res = await fetch(`https://api.telegram.org/bot${token}/getMe`);
        const data = await res.json();
        
        if (data.ok) {
          const newBot = { token, username: data.result.username, id: data.result.id };
          if (!state.bots.some(b => b.id === newBot.id)) {
            state.bots.push(newBot);
            saveSafe(STORAGE_KEYS.BOTS, state.bots);
            renderBots();
            updateBotSelect();
            els.tokenInput.value = '';
            alert('Бот добавлен!');
          } else {
            alert('Бот уже добавлен');
          }
        } else {
          alert('Ошибка API: ' + data.description);
        }
      } catch (e) {
        alert('Ошибка сети');
      } finally {
        els.connectBtn.disabled = false;
        els.connectBtn.textContent = 'Подключить';
      }
    });

    // Send Message
    els.sendBtn?.addEventListener('click', async () => {
      const botIdx = state.selectedBotIndex;
      if (!state.bots[botIdx]) return alert('Выбери бота');
      
      const chatId = els.chatIdInput.value.trim();
      const text = els.messageText.value.trim();
      if (!chatId || !text) return alert('Заполни Chat ID и Текст');

      els.sendBtn.disabled = true;
      els.sendBtn.textContent = 'Отправка...';

      try {
        const bot = state.bots[botIdx];
        const res = await fetch(`https://api.telegram.org/bot${bot.token}/sendMessage`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ chat_id: chatId, text })
        });
        const data = await res.json();
        
        if (data.ok) {
          state.messages.push({ date: new Date().toISOString(), text, chatId, bot: bot.username });
          saveSafe(STORAGE_KEYS.MSGS, state.messages);
          renderFeed();
          els.messageText.value = '';
          alert('Отправлено');
        } else {
          alert('Ошибка: ' + data.description);
        }
      } catch (e) {
        alert('Ошибка сети');
      } finally {
        els.sendBtn.disabled = false;
        els.sendBtn.textContent = 'Отправить';
      }
    });

    // Theme Toggle
    els.themeToggle?.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem(STORAGE_KEYS.THEME, next);
    });

    // Init
    (function init() {
      const savedTheme = localStorage.getItem(STORAGE_KEYS.THEME);
      if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
      
      renderBots();
      updateBotSelect();
      renderFeed();
    })();
  </script>
</body>
</html>
