<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Client · Premium</title>
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --primary: #007AFF;
      --success: #34C759;
      --warning: #FF9500;
      --error: #FF3B30;
      --text: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --bg-gradient-1: #1a1a2e;
      --bg-gradient-2: #16213e;
      --bg-gradient-3: #0f3460;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.47059;
      font-weight: 400;
      letter-spacing: -0.022em;
    }
    
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* Glass Card */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--glass-shadow);
      padding: 24px;
      margin-bottom: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding: 20px 0;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.021em;
    }
    
    .brand-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--primary), #5856D6);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
    }
    
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .tab-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }
    
    .tab-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    
    /* Bot List */
    .bot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    
    .bot-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .bot-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), #5856D6);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .bot-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
    }
    
    .bot-card:hover::before {
      opacity: 1;
    }
    
    .bot-card.active {
      background: rgba(0, 122, 255, 0.15);
      border-color: var(--primary);
    }
    
    .bot-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .bot-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 600;
    }
    
    .bot-info h3 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .bot-info p {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .bot-stats {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--glass-border);
    }
    
    .stat {
      display: flex;
      flex-direction: column;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    
    /* Inputs */
    .input-group {
      margin-bottom: 20px;
    }
    
    .label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .input, .textarea, .select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .input:focus, .textarea:focus, .select:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
    }
    
    .textarea {
      min-height: 120px;
      resize: vertical;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 14px;
    }
    
    /* Buttons */
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: inherit;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #5856D6);
      color: white;
      box-shadow: 0 4px 16px rgba(0, 122, 255, 0.4);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 122, 255, 0.5);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid var(--glass-border);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .btn-success {
      background: var(--success);
      color: white;
    }
    
    /* Button Builder */
    .button-builder {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
    }
    
    .button-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }
    
    .button-item {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .button-item input {
      flex: 1;
      min-width: 150px;
    }
    
    .color-picker {
      width: 50px;
      height: 40px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
    }
    
    .remove-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(255, 59, 48, 0.2);
      color: var(--error);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .remove-btn:hover {
      background: rgba(255, 59, 48, 0.3);
      transform: scale(1.1);
    }
    
    /* Message Preview */
    .message-preview {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 18px;
      padding: 16px;
      margin-top: 20px;
      max-width: 400px;
    }
    
    .preview-text {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 12px;
    }
    
    .preview-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .preview-btn {
      padding: 12px 16px;
      border-radius: 10px;
      text-align: center;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .preview-btn:hover {
      transform: scale(1.02);
    }
    
    /* Section Title */
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Feed */
    .feed {
      max-height: 600px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .feed-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      transition: all 0.3s ease;
    }
    
    .feed-item:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateX(4px);
    }
    
    .feed-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .feed-content {
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    
    /* Auth Section */
    .auth-section {
      text-align: center;
      padding: 40px 20px;
    }
    
    .auth-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--primary), #5856D6);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 24px rgba(0, 122, 255, 0.4);
    }
    
    .auth-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .auth-text {
      color: var(--text-secondary);
      margin-bottom: 24px;
      font-size: 15px;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }
      
      .tabs {
        width: 100%;
        overflow-x: auto;
      }
      
      .bot-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-icon">🤖</div>
        <span>Bot Client</span>
      </div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="bots">
          <span>📱</span> Мои боты
        </button>
        <button class="tab-btn" data-tab="compose">
          <span>✍️</span> Создать
        </button>
        <button class="tab-btn" data-tab="feed">
          <span>📊</span> История
        </button>
      </nav>
    </header>

    <!-- Bots Tab -->
    <section id="bots" class="tab-content active">
      <div class="glass-card">
        <div class="section-title">
          <span>🤖</span>
          Управление ботами
        </div>
        
        <div id="authSection" class="auth-section">
          <div class="auth-icon">🔐</div>
          <h2 class="auth-title">Подключите Telegram бота</h2>
          <p class="auth-text">Введите токен вашего бота для начала работы</p>
          <div style="max-width: 500px; margin: 0 auto;">
            <input type="text" id="tokenInput" class="input" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11" style="margin-bottom: 16px;">
            <button class="btn btn-primary" onclick="connectBot()" style="width: 100%;">
              <span>🔗</span> Подключить бота
            </button>
          </div>
        </div>
        
        <div id="botList" class="bot-grid" style="display: none;">
          <!-- Bot cards will be inserted here -->
        </div>
      </div>
    </section>

    <!-- Compose Tab -->
    <section id="compose" class="tab-content" style="display: none;">
      <div class="glass-card">
        <div class="section-title">
          <span>✍️</span>
          Создание сообщения
        </div>
        
        <div class="input-group">
          <label class="label">Выберите бота</label>
          <select id="botSelect" class="select">
            <option value="">-- Выберите бота --</option>
          </select>
        </div>
        
        <div class="input-group">
          <label class="label">Chat ID</label>
          <input type="text" id="chatIdInput" class="input" placeholder="@username или 123456789">
        </div>
        
        <div class="input-group">
          <label class="label">Текст сообщения</label>
          <textarea id="messageText" class="textarea" placeholder="Введите текст сообщения..."></textarea>
        </div>
        
        <!-- Button Builder -->
        <div class="button-builder">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <label class="label" style="margin: 0;">Кнопки под сообщением</label>
            <button class="btn btn-secondary" onclick="addButton()" style="padding: 8px 16px; font-size: 14px;">
              <span>+</span> Добавить кнопку
            </button>
          </div>
          
          <div id="buttonList" class="button-list"></div>
        </div>
        
        <!-- Preview -->
        <div class="message-preview">
          <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">Предпросмотр</div>
          <div class="preview-text" id="previewText">Текст сообщения...</div>
          <div class="preview-buttons" id="previewButtons"></div>
        </div>
        
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button class="btn btn-primary" onclick="sendMessage()" style="flex: 1;">
            <span>📤</span> Отправить
          </button>
          <button class="btn btn-secondary" onclick="saveDraft()">
            <span>💾</span> Сохранить
          </button>
        </div>
      </div>
    </section>

    <!-- Feed Tab -->
    <section id="feed" class="tab-content" style="display: none;">
      <div class="glass-card">
        <div class="section-title">
          <span>📊</span>
          История сообщений
        </div>
        <div id="messageFeed" class="feed">
          <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <div style="font-size: 48px; margin-bottom: 12px;">📭</div>
            <div>История пуста</div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // ===== STATE =====
    const state = {
      bots: JSON.parse(localStorage.getItem('bc_bots') || '[]'),
      currentBot: null,
      messages: JSON.parse(localStorage.getItem('bc_messages') || '[]'),
      buttons: []
    };

    // ===== TABS =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).style.display = 'block';
        
        if (btn.dataset.tab === 'bots') renderBots();
        if (btn.dataset.tab === 'compose') updateBotSelect();
        if (btn.dataset.tab === 'feed') renderFeed();
      });
    });

    // ===== BOT MANAGEMENT =====
    async function connectBot() {
      const token = document.getElementById('tokenInput').value.trim();
      if (!token) {
        alert('Введите токен бота');
        return;
      }
      
      try {
        const res = await fetch(`https://api.telegram.org/bot${token}/getMe`);
        const data = await res.json();
        
        if (data.ok) {
          const bot = {
            id: data.result.id,
            username: data.result.username,
            first_name: data.result.first_name,
            token: token,
            connected: new Date().toISOString(),
            stats: { messages: 0, users: 0 }
          };
          
          state.bots.push(bot);
          localStorage.setItem('bc_bots', JSON.stringify(state.bots));
          
          document.getElementById('tokenInput').value = '';
          renderBots();
          
          // Show success
          alert(`Бот @${bot.username} успешно подключен!`);
        } else {
          alert('Ошибка: неверный токен');
        }
      } catch (e) {
        alert('Ошибка подключения: ' + e.message);
      }
    }

    function renderBots() {
      const list = document.getElementById('botList');
      const authSection = document.getElementById('authSection');
      
      if (state.bots.length === 0) {
        authSection.style.display = 'block';
        list.style.display = 'none';
        return;
      }
      
      authSection.style.display = 'none';
      list.style.display = 'grid';
      
      list.innerHTML = state.bots.map((bot, index) => `
        <div class="bot-card ${state.currentBot === index ? 'active' : ''}" onclick="selectBot(${index})">
          <div class="bot-header">
            <div class="bot-avatar">${bot.first_name[0].toUpperCase()}</div>
            <div class="bot-info">
              <h3>@${bot.username}</h3>
              <p>${bot.first_name}</p>
            </div>
          </div>
          <div class="bot-stats">
            <div class="stat">
              <div class="stat-value">${bot.stats.messages}</div>
              <div class="stat-label">Сообщений</div>
            </div>
            <div class="stat">
              <div class="stat-value">${bot.stats.users}</div>
              <div class="stat-label">Пользователей</div>
            </div>
          </div>
          <div style="margin-top: 12px; display: flex; gap: 8px;">
            <button class="btn btn-secondary" onclick="event.stopPropagation(); viewBotStats(${index})" style="flex: 1; padding: 8px; font-size: 13px;">
              📊 Статистика
            </button>
            <button class="btn btn-secondary" onclick="event.stopPropagation(); removeBot(${index})" style="padding: 8px 12px; font-size: 13px; color: var(--error);">
              🗑️
            </button>
          </div>
        </div>
      `).join('');
    }

    function selectBot(index) {
      state.currentBot = index;
      renderBots();
    }

    function removeBot(index) {
      if (confirm('Удалить этого бота?')) {
        state.bots.splice(index, 1);
        localStorage.setItem('bc_bots', JSON.stringify(state.bots));
        if (state.currentBot === index) state.currentBot = null;
        renderBots();
      }
    }

    function viewBotStats(index) {
      const bot = state.bots[index];
      alert(`Статистика @${bot.username}:\n\nСообщений: ${bot.stats.messages}\nПользователей: ${bot.stats.users}\nПодключен: ${new Date(bot.connected).toLocaleDateString()}`);
    }

    function updateBotSelect() {
      const select = document.getElementById('botSelect');
      select.innerHTML = '<option value="">-- Выберите бота --</option>' +
        state.bots.map((bot, i) => `<option value="${i}">@${bot.username}</option>`).join('');
    }

    // ===== BUTTON BUILDER =====
    function addButton() {
      const list = document.getElementById('buttonList');
      const id = Date.now();
      
      state.buttons.push({ id, text: '', url: '', color: '#007AFF' });
      
      const div = document.createElement('div');
      div.className = 'button-item fade-in';
      div.dataset.id = id;
      div.innerHTML = `
        <input type="text" placeholder="Текст кнопки" class="input" style="flex: 2; min-width: 120px;" onchange="updateButton(${id}, 'text', this.value)">
        <input type="text" placeholder="URL" class="input" style="flex: 2; min-width: 150px;" onchange="updateButton(${id}, 'url', this.value)">
        <input type="color" class="color-picker" value="#007AFF" onchange="updateButton(${id}, 'color', this.value)">
        <button class="remove-btn" onclick="removeButton(${id})">✕</button>
      `;
      
      list.appendChild(div);
      updatePreview();
    }

    function updateButton(id, field, value) {
      const btn = state.buttons.find(b => b.id === id);
      if (btn) {
        btn[field] = value;
        updatePreview();
      }
    }

    function removeButton(id) {
      state.buttons = state.buttons.filter(b => b.id !== id);
      document.querySelector(`[data-id="${id}"]`).remove();
      updatePreview();
    }

    function updatePreview() {
      const text = document.getElementById('messageText').value || 'Текст сообщения...';
      document.getElementById('previewText').textContent = text;
      
      const buttonsContainer = document.getElementById('previewButtons');
      buttonsContainer.innerHTML = state.buttons.map(btn => `
        <div class="preview-btn" style="background: ${btn.color}; color: white;">
          ${btn.text || 'Кнопка'}
        </div>
      `).join('');
    }

    document.getElementById('messageText').addEventListener('input', updatePreview);

    // ===== SEND MESSAGE =====
    async function sendMessage() {
      const botIndex = document.getElementById('botSelect').value;
      const chatId = document.getElementById('chatIdInput').value.trim();
      const text = document.getElementById('messageText').value.trim();
      
      if (!botIndex) { alert('Выберите бота'); return; }
      if (!chatId) { alert('Введите Chat ID'); return; }
      if (!text) { alert('Введите текст сообщения'); return; }
      
      const bot = state.bots[botIndex];
      
      // Build inline keyboard
      const inlineKeyboard = state.buttons.length > 0 ? {
        inline_keyboard: [state.buttons.map(btn => ({
          text: btn.text,
          url: btn.url
        }))]
      } : undefined;
      
      try {
        const res = await fetch(`https://api.telegram.org/bot${bot.token}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: chatId,
            text: text,
            reply_markup: inlineKeyboard
          })
        });
        
        const data = await res.json();
        
        if (data.ok) {
          // Save message
          const msg = {
            id: Date.now(),
            bot: bot.username,
            chat: chatId,
            text: text,
            buttons: state.buttons,
            timestamp: new Date().toISOString(),
            messageId: data.result.message_id
          };
          
          state.messages.unshift(msg);
          localStorage.setItem('bc_messages', JSON.stringify(state.messages));
          
          // Update stats
          bot.stats.messages++;
          localStorage.setItem('bc_bots', JSON.stringify(state.bots));
          
          // Clear form
          document.getElementById('messageText').value = '';
          state.buttons = [];
          document.getElementById('buttonList').innerHTML = '';
          updatePreview();
          
          alert('Сообщение отправлено!');
        } else {
          alert('Ошибка: ' + (data.description || 'Неизвестная ошибка'));
        }
      } catch (e) {
        alert('Ошибка отправки: ' + e.message);
      }
    }

    function saveDraft() {
      const text = document.getElementById('messageText').value;
      localStorage.setItem('bc_draft', text);
      alert('Черновик сохранен!');
    }

    // ===== FEED =====
    function renderFeed() {
      const feed = document.getElementById('messageFeed');
      
      if (state.messages.length === 0) {
        feed.innerHTML = `
          <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <div style="font-size: 48px; margin-bottom: 12px;">📭</div>
            <div>История пуста</div>
          </div>
        `;
        return;
      }
      
      feed.innerHTML = state.messages.map(msg => `
        <div class="feed-item fade-in">
          <div class="feed-meta">
            <span>🤖 @${msg.bot}</span>
            <span>👤 ${msg.chat}</span>
            <span>🕐 ${new Date(msg.timestamp).toLocaleString()}</span>
          </div>
          <div class="feed-content">${msg.text}</div>
          ${msg.buttons.length > 0 ? `
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--glass-border);">
              <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">Кнопок: ${msg.buttons.length}</div>
              <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                ${msg.buttons.map(b => `
                  <span style="padding: 4px 12px; background: ${b.color}; color: white; border-radius: 6px; font-size: 12px;">${b.text}</span>
                `).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    // Load draft on start
    window.addEventListener('DOMContentLoaded', () => {
      const draft = localStorage.getItem('bc_draft');
      if (draft) document.getElementById('messageText').value = draft;
    });
  </script>
</body>
</html>
