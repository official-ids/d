<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RedicterURL · MyBrowser</title>
  <style>
    :root {
      --bg: #0b1118; --surface: #111b27; --surface-hover: #16202d;
      --border: #1e2d3d; --text: #e2e8f0; --text-muted: #64748b;
      --primary: #3b82f6; --primary-hover: #2563eb;
      --success: #10b981; --warning: #f59e0b; --error: #ef4444;
      --radius: 10px; --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --surface: #ffffff; --surface-hover: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
      --primary: #2563eb; --primary-hover: #1d4ed8;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 20px; line-height: 1.5;
    }
    .app { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    
    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 1.2rem; }
    .brand svg { stroke: var(--primary); }
    
    /* Auth status */
    .auth-status { display: flex; align-items: center; gap: 12px; }
    .user-info { font-size: 0.9rem; color: var(--text-muted); }
    .btn {
      padding: 10px 18px; border-radius: var(--radius); border: none;
      background: var(--primary); color: #fff; font-weight: 500;
      cursor: pointer; transition: all 0.2s; display: inline-flex;
      align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--surface-hover); }
    .btn-danger { background: var(--error); }
    .btn-danger:hover { background: #dc2626; }
    
    /* Cards */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
    }
    
    /* Form */
    .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .input {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 12px; border-radius: var(--radius);
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
      font-family: var(--font);
    }
    .input:focus { border-color: var(--primary); }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
    
    .hint { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    
    /* Redirects list */
    .redirects-list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
    .redirect-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; display: flex;
      justify-content: space-between; align-items: center; gap: 12px;
    }
    .redirect-info { flex: 1; min-width: 0; }
    .redirect-slug { font-weight: 600; color: var(--primary); }
    .redirect-url { font-size: 0.9rem; color: var(--text-muted); word-break: break-all; }
    .redirect-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; display: flex; gap: 12px; }
    .redirect-actions { display: flex; gap: 6px; }
    
    /* Empty state */
    .empty { text-align: center; color: var(--text-muted); padding: 40px 0; }
    .empty svg { opacity: 0.4; margin-bottom: 12px; }
    
    /* Toast */
    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000;
      background: var(--surface); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 10px; box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    /* Auth modal overlay */
    .auth-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 2000;
      display: none; align-items: center; justify-content: center;
    }
    .auth-overlay.show { display: flex; }
    
    /* Theme toggle */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--primary); }
    
    @media (max-width: 600px) {
      .header { flex-direction: column; align-items: stretch; }
      .row { flex-direction: column; }
      .redirect-item { flex-direction: column; align-items: stretch; }
      .redirect-actions { justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span>RedicterURL</span>
      </div>
      <div class="auth-status">
        <span class="user-info" id="userInfo">Не авторизован</span>
        <button class="btn" id="authBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><circle cx="12" cy="16" r="1.5"/></svg>
          Войти
        </button>
        <button class="theme-toggle" id="themeToggle" title="Тема">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>
    </header>

    <!-- Create Redirect Form (скрыт, если не авторизован) -->
    <section id="createSection" class="card" style="display:none;">
      <h3 style="margin-bottom:16px;">Создать редирект</h3>
      <div class="input-group">
        <label class="label">Короткая ссылка (slug)</label>
        <input type="text" id="slugInput" class="input" placeholder="my-link" pattern="[a-z0-9_-]{3,50}" required>
        <div class="hint">Только a-z, 0-9, _, - (3-50 символов). Будет: <code>/URL/my-link</code></div>
      </div>
      <div class="input-group">
        <label class="label">Целевой URL</label>
        <input type="url" id="urlInput" class="input" placeholder="https://example.com" required>
      </div>
      <button class="btn" id="createBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Создать
      </button>
    </section>

    <!-- Redirects List -->
    <section id="listSection" class="card" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h3>Мои редиректы</h3>
        <button class="btn btn-outline" id="refreshBtn" title="Обновить">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 2v6h-6M3 22v-6h6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></svg>
        </button>
      </div>
      <div id="redirectsList" class="redirects-list">
        <div class="empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          <span>Пока нет созданных редиректов</span>
        </div>
      </div>
    </section>

    <!-- Auth required message -->
    <section id="authRequired" class="card">
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <h3 style="margin-bottom:8px;">Требуется вход</h3>
        <p style="color:var(--text-muted); margin-bottom:16px;">Войдите, чтобы создавать и управлять редиректами</p>
        <button class="btn" id="loginBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
          Войти / Зарегистрироваться
        </button>
      </div>
    </section>
  </div>

  <!-- Auth Modal (внешний компонент) -->
  <div id="authModalContainer"></div>

  <!-- Toast container -->
  <div id="toastContainer"></div>

  <script src="/auth.js"></script>
  <script src="/components/auth-modal.html"></script>
  <script>
    // ===== STATE =====
    let user = null;
    const API_BASE = './api/redirect';

    // ===== UTILS =====
    const $ = (sel) => document.querySelector(sel);
    const toast = (msg, type = 'info') => {
      const container = $('#toastContainer');
      const t = document.createElement('div');
      t.className = 'toast';
      const color = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--error)' : 'var(--primary)';
      t.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${color}"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><span>${msg}</span>`;
      container.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(100%)'; setTimeout(() => t.remove(), 300); }, 3000);
    };

    // ===== AUTH =====
    async function checkAuth() {
      const session = window.supabaseAuth?.getSession?.();
      if (session?.access_token) {
        user = await window.supabaseAuth.getUser();
        if (user) {
          $('#userInfo').textContent = user.email;
          $('#authBtn').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="9" y1="12" x2="21" y2="12"/></svg> Выйти`;
          $('#authBtn').onclick = async () => {
            if (confirm('Выйти?')) {
              await window.supabaseAuth.signOut();
              window.location.reload();
            }
          };
          $('#createSection').style.display = '';
          $('#listSection').style.display = '';
          $('#authRequired').style.display = 'none';
          loadRedirects();
        }
      } else {
        $('#authBtn').onclick = () => {
          // Сохраняем текущий URL для возврата после входа
          localStorage.setItem('auth_return_url', window.location.pathname);
          window.openAuthModal?.();
        };
      }
    }

    // ===== API =====
    async function apiRequest(method, body = null) {
      const session = window.supabaseAuth.getSession();
      const res = await fetch(API_BASE, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${session?.access_token}`
        },
        body: body ? JSON.stringify(body) : null
      });
      return res.json();
    }

    async function createRedirect(slug, targetUrl) {
      const res = await apiRequest('POST', { slug, targetUrl });
      if (res.error) throw new Error(res.error);
      return res.data;
    }

    async function getRedirects() {
      const res = await apiRequest('GET');
      if (res.error) throw new Error(res.error);
      return res.data || [];
    }

    async function deleteRedirect(slug) {
      const res = await apiRequest('DELETE', { slug });
      if (res.error) throw new Error(res.error);
      return true;
    }

    // ===== RENDER =====
    function renderRedirects(list) {
      const container = $('#redirectsList');
      if (list.length === 0) {
        container.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span>Пока нет созданных редиректов</span></div>`;
        return;
      }
      container.innerHTML = list.map(r => `
        <div class="redirect-item">
          <div class="redirect-info">
            <div class="redirect-slug">/URL/${r.slug}</div>
            <div class="redirect-url">${r.target_url}</div>
            <div class="redirect-meta">
              <span>👁 ${r.clicks} кликов</span>
              <span>🕐 ${new Date(r.created_at).toLocaleDateString()}</span>
              <span style="color:${r.is_active ? 'var(--success)' : 'var(--text-muted)'}">${r.is_active ? 'Активен' : 'Неактивен'}</span>
            </div>
          </div>
          <div class="redirect-actions">
            <button class="btn btn-outline" onclick="copyUrl('${r.slug}')" title="Копировать ссылку">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="btn btn-outline btn-danger" onclick="deleteSlug('${r.slug}')" title="Удалить">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    async function loadRedirects() {
      try {
        const list = await getRedirects();
        renderRedirects(list);
      } catch (e) {
        toast('Ошибка загрузки: ' + e.message, 'error');
      }
    }

    // ===== ACTIONS =====
    async function handleCreate() {
      const slug = $('#slugInput').value.trim().toLowerCase();
      const targetUrl = $('#urlInput').value.trim();
      
      if (!/^[a-z0-9_-]{3,50}$/i.test(slug)) {
        toast('slug: 3-50 символов, только a-z, 0-9, _, -', 'error');
        return;
      }
      if (!/^https?:\/\//i.test(targetUrl)) {
        toast('Введите валидный URL (https://...)', 'error');
        return;
      }

      $('#createBtn').disabled = true;
      try {
        await createRedirect(slug, targetUrl);
        toast('Редирект создан!', 'success');
        $('#slugInput').value = '';
        $('#urlInput').value = '';
        loadRedirects();
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        $('#createBtn').disabled = false;
      }
    }

    window.copyUrl = (slug) => {
      const fullUrl = `${window.location.origin}/URL/${slug}`;
      navigator.clipboard.writeText(fullUrl).then(() => toast('Ссылка скопирована!', 'success'));
    };

    window.deleteSlug = async (slug) => {
      if (!confirm(`Удалить редирект /URL/${slug}?`)) return;
      try {
        await deleteRedirect(slug);
        toast('Удалено', 'success');
        loadRedirects();
      } catch (e) {
        toast(e.message, 'error');
      }
    };

    // ===== INIT =====
    function init() {
      // Theme
      const savedTheme = localStorage.getItem('mybrowser_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      $('#themeToggle').onclick = () => {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('mybrowser_theme', next);
      };

      // Auth modal container
      const modalContainer = document.createElement('div');
      modalContainer.id = 'authModalContainer';
      document.body.appendChild(modalContainer);
      fetch('/components/auth-modal.html')
        .then(r => r.text())
        .then(html => { modalContainer.innerHTML = html; })
        .catch(() => { console.warn('Auth modal not loaded'); });

      // Events
      $('#createBtn').onclick = handleCreate;
      $('#refreshBtn').onclick = loadRedirects;
      $('#loginBtn').onclick = () => {
        localStorage.setItem('auth_return_url', window.location.pathname);
        window.openAuthModal?.();
      };

      // Auto-check auth
      checkAuth();
      
      // Listen for auth changes
      window.onAuthSuccess = () => {
        user = null;
        checkAuth();
      };
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
