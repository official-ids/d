<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      max-width: 520px;
    }

    h1 {
      font-size: 72px;
      margin: 0;
      font-weight: 600;
      color: #374151;
      letter-spacing: -1px;
    }

    h2 {
      margin: 10px 0 6px;
      font-weight: 500;
      color: #111827;
    }

    p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .illustration {
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
      opacity: 0.9;
    }

    a {
      display: inline-block;
      padding: 11px 18px;
      border-radius: 10px;
      background: #e5e7eb;
      color: #111827;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, transform 0.15s;
    }

    a:hover {
      background: #d1d5db;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="illustration" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="18" width="80" height="64" rx="10" stroke="#9ca3af" stroke-width="2"/>
      <circle cx="45" cy="45" r="6" fill="#9ca3af"/>
      <circle cx="75" cy="45" r="6" fill="#9ca3af"/>
      <path d="M40 65C45 60 75 60 80 65" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/>
      <rect x="48" y="82" width="24" height="10" rx="4" fill="#d1d5db"/>
    </svg>

    <h1>404</h1>
    <h2>Page not found</h2>
    <p>
      It looks like there is no such page on Seraviel LABS.<br>
      The link may be outdated or the address may be incorrect.
    </p>
    <a href="https://seraviel-labs.vercel.app/">Go back to the main page</a>
    <div class="footer">seraviel-labs.vercel.app</div>
  </div>
</body>
</html>
